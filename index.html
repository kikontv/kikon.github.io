  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- PARSER UTILS & ENGINE ---
    function generateId() {
      return Math.random().toString(36).substring(2, 11);
    }

    function hasArabicCharacters(text) {
      return /[\u0600-\u06FF]/.test(text);
    }

    function classifyRegion(name, groupTitle) {
      const combined = `${name} ${groupTitle}`.toUpperCase();
      if (combined.includes('ARABIC') || combined.includes('AR ') || combined.includes(':AR') || combined.includes('OSN') || combined.includes('BEIN') || combined.includes('MBC') || combined.includes('MY-HD') || hasArabicCharacters(combined)) {
        return '🇸🇦 العالم العربي';
      }
      if (combined.includes('FRANCE') || combined.includes(' FR') || combined.includes(':FR')) {
        return '🇫🇷 فرنسا';
      }
      if (combined.includes('USA') || combined.includes('UNITED STATES') || combined.includes(' UK') || combined.includes('ENGLAND') || combined.includes('ENGLISH') || combined.includes(':US') || combined.includes(':UK')) {
        return '🇺🇸 أمريكا وبريطانيا';
      }
      if (combined.includes('SPAIN') || combined.includes('ESPA') || combined.includes(' ES') || combined.includes(':ES')) {
        return '🇪🇸 إسبانيا';
      }
      if (combined.includes('ITALY') || combined.includes(' IT ') || combined.includes(':IT') || combined.includes('ITALIAN')) {
        return '🇮🇹 إيطاليا';
      }
      if (combined.includes('GERMANY') || combined.includes(' DE') || combined.includes(':DE') || combined.includes('DEUTSCH')) {
        return '🇩🇪 ألمانيا';
      }
      if (combined.includes('TURKEY') || combined.includes(' TR') || combined.includes(':TR') || combined.includes('TURK')) {
        return '🇹🇷 تركيا';
      }
      if (combined.includes('NETHERLANDS') || combined.includes(' NL') || combined.includes(':NL') || combined.includes('DUTCH')) {
        return '🇳🇱 هولندا';
      }
      if (groupTitle && groupTitle.trim().length > 0) {
        return groupTitle.trim();
      }
      return '🌐 باقة عامة';
    }

    function classifyGenre(name, groupTitle) {
      const combined = `${name} ${groupTitle}`.toLowerCase();
      if (combined.includes('film') || combined.includes('movie') || combined.includes('cinema') || combined.includes('سينما') || combined.includes('افلام') || combined.includes('أفلام')) {
        return '🎬 أفلام وسينما';
      }
      if (combined.includes('مسلسل') || combined.includes('series') || combined.includes('drama') || combined.includes('دراما') || combined.includes('مسلسلات')) {
        return '📺 مسلسلات ودراما';
      }
      if (combined.includes('kids') || combined.includes('cartoon') || combined.includes('اطفال') || combined.includes('أطفال') || combined.includes('كارتون') || combined.includes('براعم') || combined.includes('disney')) {
        return '🧸 أطفال وكرتون';
      }
      if (combined.includes('doc') || combined.includes('national') || combined.includes('geo') || combined.includes('وثائقي') || combined.includes('وثائقية') || combined.includes('وثائقيات')) {
        return '🌿 وثائقيات وثقافة';
      }
      if (combined.includes('sport') || combined.includes('ssc') || combined.includes('bein') || combined.includes('رياضة') || combined.includes('كورة') || combined.includes('كرة') || combined.includes('كأس')) {
        return '⚽ رياضة ومباريات';
      }
      return '';
    }

    function detectStreamType(url, name, group) {
      const combined = `${name} ${group} ${url}`.toLowerCase();
      if (combined.includes('movie') || combined.includes('vod') || url.endsWith('.mp4') || url.endsWith('.mkv')) {
        return 'vod';
      }
      if (combined.includes('series') || combined.includes('مسلسل') || combined.includes('episodes')) {
        return 'series';
      }
      return 'live';
    }

    function parseM3U(payload) {
      const lines = payload.split(/\r?\n/);
      const channels = [];
      let currentInfo = null;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        if (line.startsWith('#EXTINF:')) {
          let name = '';
          let logo = undefined;
          let group = '';

          const groupMatch = line.match(/group-title="([^"]+)"/i);
          if (groupMatch) group = groupMatch[1];

          const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
          if (logoMatch) logo = logoMatch[1];

          const lastComma = line.lastIndexOf(',');
          if (lastComma !== -1) {
            name = line.substring(lastComma + 1).trim();
          } else {
            name = `قناة مجهولة ${channels.length + 1}`;
          }

          currentInfo = { name, logo, group };
        } else if (line.startsWith('http://') || line.startsWith('https://')) {
          const url = line;
          if (currentInfo) {
            let classifiedGroup = classifyRegion(currentInfo.name, currentInfo.group);
            const genreTag = classifyGenre(currentInfo.name, currentInfo.group);
            if (genreTag) {
              classifiedGroup = `${classifiedGroup} - ${genreTag}`;
            }

            const type = detectStreamType(url, currentInfo.name, currentInfo.group);

            channels.push({
              id: generateId(),
              name: currentInfo.name,
              url,
              logo: currentInfo.logo,
              group: classifiedGroup,
              type,
              favorite: false,
              importedAt: Date.now(),
              status: 'unknown'
            });
            currentInfo = null;
          } else {
            const name = `بث مباشر ${channels.length + 1}`;
            const classifiedGroup = '🌐 باقة عامة';
            const type = detectStreamType(url, name, '');
            channels.push({
              id: generateId(),
              name,
              url,
              group: classifiedGroup,
              type,
              favorite: false,
              importedAt: Date.now(),
              status: 'unknown'
            });
          }
        }
      }
      return channels;
    }

    function parseRawTextUrls(text) {
      const channels = [];
      const lines = text.split(/\r?\n/);
      const urlPattern = /(https?:\/\/[^\s"'`<>]+)/gi;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const matches = line.match(urlPattern);
        if (matches) {
          for (const url of matches) {
            let name = line.replace(url, '').replace(/[#*,\-\[\]()]/g, '').trim();
            if (!name || name.length < 2) {
              try {
                const parsedUrl = new URL(url);
                const pathSegments = parsedUrl.pathname.split('/');
                const lastSegment = pathSegments[pathSegments.length - 1];
                if (lastSegment && lastSegment.includes('.')) {
                  name = decodeURIComponent(lastSegment.split('.')[0]).replace(/[-_]/g, ' ');
                } else {
                  name = `بث من ${parsedUrl.hostname}`;
                }
              } catch {
                name = `بث مخصص ${channels.length + 1}`;
              }
            }

            const classifiedGroup = classifyRegion(name, '');
            const type = detectStreamType(url, name, '');

            channels.push({
              id: generateId(),
              name,
              url,
              group: classifiedGroup,
              type,
              favorite: false,
              importedAt: Date.now(),
              status: 'unknown'
            });
          }
        }
      }
      return channels;
    }

    function parseSingleUrl(url, customName) {
      const urlTrimmed = url.trim();
      if (!urlTrimmed.startsWith('http://') && !urlTrimmed.startsWith('https://')) {
        return [];
      }

      let name = customName?.trim() || '';
      if (!name) {
        try {
          const parsedUrl = new URL(urlTrimmed);
          const pathSegments = parsedUrl.pathname.split('/');
          const lastSegment = pathSegments[pathSegments.length - 1];
          if (lastSegment && lastSegment.includes('.')) {
            name = decodeURIComponent(lastSegment.split('.')[0]).replace(/[-_]/g, ' ');
          } else {
            name = `بث فردي (${parsedUrl.hostname})`;
          }
        } catch {
          name = 'بث مباشر فردي';
        }
      }

      const classifiedGroup = classifyRegion(name, 'بث فردي');
      const type = detectStreamType(urlTrimmed, name, '');

      return [{
        id: generateId(),
        name,
        url: urlTrimmed,
        group: classifiedGroup,
        type,
        favorite: false,
        importedAt: Date.now(),
        status: 'unknown'
      }];
    }

    function exportToM3U(channels) {
      let m3u = '#EXTM3U\n';
      for (const channel of channels) {
        m3u += `#EXTINF:-1 tvg-name="${channel.name}" group-title="${channel.group}"`;
        if (channel.logo) {
          m3u += ` tvg-logo="${channel.logo}"`;
        }
        m3u += `,${channel.name}\n${channel.url}\n`;
      }
      return m3u;
    }



    // STARTER CHANNELS
    const STARTER_CHANNELS = [
      {
        id: 'starter-1',
        name: 'بث مباشر للمجرات والأرض (HLS)',
        url: 'https://playertest.longtailvideo.com/adaptive/oceans/oceans.m3u8',
        logo: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=150&q=80',
        group: '🇸🇦 العالم العربي - 🌿 وثائقيات وثقافة',
        type: 'live',
        favorite: true,
        importedAt: Date.now(),
        status: 'online'
      },
      {
        id: 'starter-2',
        name: 'فيلم دموع من فولاذ Tears of Steel (VOD)',
        url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4',
        logo: 'https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=150&q=80',
        group: '🇸🇦 العالم العربي - 🌐 باقة عامة',
        type: 'live',
        favorite: false,
        importedAt: Date.now(),
        status: 'online'
      },
      {
        id: 'starter-3',
        name: 'فيديو طبيعة مهدئ خلاب (HLS)',
        url: 'https://test-streams.mux.dev/x36xhg/x36xhg.m3u8',
        logo: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=150&q=80',
        group: '🌐 باقة عامة - 🌿 وثائقيات وثقافة',
        type: 'live',

      },
      {

        url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4',
        logo: 'https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=150&q=80',
        group: '🎬 أفلام وسينما',
        type: 'vod',
        favorite: true,
        importedAt: Date.now(),
        status: 'online'
      }
    ];


    // --- VIDEO PLAYER COMPONENT ---
    function VideoPlayer({ activeChannel, onToast }) {
      const videoRef = useRef(null);
      const containerRef = useRef(null);

      const [isPlaying, setIsPlaying] = useState(false);
      const [isMuted, setIsMuted] = useState(false);
      const [volume, setVolume] = useState(1);
      const [loading, setLoading] = useState(false);
      const [errorState, setErrorState] = useState(null);
      const [playerType, setPlayerType] = useState('none');

      const hlsInstanceRef = useRef(null);
      const mpegtsInstanceRef = useRef(null);

      useEffect(() => {
        if (!activeChannel) {
          setPlayerType('none');
          setErrorState(null);
          setIsPlaying(false);
          destroyAllPlayers();
          return;
        }

        initiateStreamPlayback(activeChannel.url);
        return () => {
          destroyAllPlayers();
        };
      }, [activeChannel]);

      const destroyAllPlayers = () => {
        if (hlsInstanceRef.current) {
          hlsInstanceRef.current.destroy();
          hlsInstanceRef.current = null;
        }
        if (mpegtsInstanceRef.current) {
          mpegtsInstanceRef.current.unload();
          mpegtsInstanceRef.current.destroy();
          mpegtsInstanceRef.current = null;
        }
        if (videoRef.current) {
          videoRef.current.pause();
          videoRef.current.removeAttribute('src');
          videoRef.current.load();
        }
      };

      const initiateStreamPlayback = (url) => {
        destroyAllPlayers();
        setErrorState(null);
        setLoading(true);
        setIsPlaying(false);

        const isHls = url.toLowerCase().includes('.m3u8') || url.includes('/hls/') || (url.includes('/live/') && url.endsWith('.m3u8'));
        const isMpegTs = url.toLowerCase().includes('.ts') || (url.includes('/live/') && url.endsWith('.ts'));

        if (isHls) {
          setPlayerType('hls');
          setupHlsPlayer(url);
        } else if (isMpegTs) {
          setPlayerType('mpegts');
          setupMpegTsPlayer(url);
        } else {
          setPlayerType('html5');
          setupHtml5Player(url);
        }
      };

      const setupHlsPlayer = (url) => {
        const video = videoRef.current;
        if (!video) return;

        if (Hls.isSupported()) {
          const hls = new Hls({
            maxBufferLength: 15,
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 30,
            fragLoadingMaxRetry: 5,
            manifestLoadingMaxRetry: 5,
          });
          hlsInstanceRef.current = hls;
          hls.loadSource(url);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            setLoading(false);
            video.play()
              .then(() => setIsPlaying(true))
              .catch((err) => console.log('HLS block:', err));
          });

          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              setLoading(false);
              setErrorState('خطأ فادح في البث (HLS Error). قد يكون الرابط منتهياً أو يحتاج تجاوز CORS.');
              destroyAllPlayers();
            }
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
          video.addEventListener('loadedmetadata', () => {
            setLoading(false);
            video.play()
              .then(() => setIsPlaying(true));
          });
        } else {
          setLoading(false);
          setErrorState('المتصفح لا يدعم بث M3U8/HLS.');
        }
      };

      const setupMpegTsPlayer = (url) => {
        const video = videoRef.current;
        if (!video) return;

        if (mpegts.isSupported()) {
          try {
            const player = mpegts.createPlayer({
              type: 'mse',
              url: url,
              isLive: true
            }, {
              enableStashBuffer: false,
              stashInitialSize: 128,
            });

            mpegtsInstanceRef.current = player;
            player.attachMediaElement(video);
            player.load();
            player.play()
              .then(() => {
                setLoading(false);
                setIsPlaying(true);
              })
              .catch(() => emergencyFallback(url));

            player.on(mpegts.Events.ERROR, () => emergencyFallback(url));
          } catch {
            emergencyFallback(url);
          }
        } else {
          emergencyFallback(url);
        }
      };

      const emergencyFallback = (url) => {
        const video = videoRef.current;
        if (!video) return;
        destroyAllPlayers();
        video.src = url;
        video.load();
        video.play()
          .then(() => {
            setLoading(false);
            setIsPlaying(true);
          })
          .catch(() => {
            setLoading(false);
            setErrorState('فشل تشغيل بث MPEG-TS الرئيسي والبديل. تأكد من توفر CORS وصلاحية البث.');
          });
      };

      const setupHtml5Player = (url) => {
        const video = videoRef.current;
        if (!video) return;
        video.src = url;
        video.load();

        video.addEventListener('canplay', () => {
          video.play()
            .then(() => {
              setLoading(false);
              setIsPlaying(true);
            })
            .catch(() => {
              setLoading(false);
              setErrorState('فشل تشغيل ملف الفيديو المباشر.');
            });
        }, { once: true });

        video.addEventListener('error', () => {
          setLoading(false);
          setErrorState('تعذر تحميل هذا الرابط أو الصيغة غير مدعومة.');
        }, { once: true });
      };

      const hardPause = () => {
        if (videoRef.current) {
          videoRef.current.pause();
        }
        if (hlsInstanceRef.current) {
          hlsInstanceRef.current.stopLoad();
          onToast('تم إيقاف HLS المؤقت للشبكة', 'warning');
        } else if (mpegtsInstanceRef.current) {
          mpegtsInstanceRef.current.unload();
          onToast('تم إيقاف TS المؤقت للشبكة', 'warning');
        } else {
          onToast('تم إيقاف التشغيل', 'info');
        }
        setIsPlaying(false);
      };

      const hardResume = () => {
        if (!activeChannel) return;
        onToast('جاري استئناف البث والاتصال بحافة البث المباشرة...', 'success');
        initiateStreamPlayback(activeChannel.url);
      };

      const toggleMute = () => {
        const nextMute = !isMuted;
        setIsMuted(nextMute);
        if (videoRef.current) {
          videoRef.current.muted = nextMute;
        }
      };

      const handleVolumeChange = (e) => {
        const vol = parseFloat(e.target.value);
        setVolume(vol);
        setIsMuted(vol === 0);
        if (videoRef.current) {
          videoRef.current.volume = vol;
          videoRef.current.muted = vol === 0;
        }
      };

      const toggleFullscreen = () => {
        if (!containerRef.current) return;
        if (!document.fullscreenElement) {
          containerRef.current.requestFullscreen().catch(err => console.error(err));
        } else {
          document.exitFullscreen();
        }
      };

      return (
        <div class="flex flex-col gap-4">
          {/* Frame Screen */}
          <div 
            ref={containerRef}
            class="relative aspect-video w-full rounded-2xl bg-black border border-slate-800/80 overflow-hidden shadow-2xl flex items-center justify-center group"
          >
            {/* Placeholder Empty */}
            {!activeChannel && (
              <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center bg-gradient-to-b from-slate-950 to-black z-10">
                <div class="w-16 h-16 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center mb-4 text-orange-500 shadow-lg animate-pulse">
                  <i class="fa-solid fa-wifi text-2xl"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-200">لا يوجد بث نشط حالياً</h3>
                <p class="text-sm text-slate-500 mt-1 max-w-sm">
                  اختر قناة من القائمة الجانبية أو قم باستيراد قائمة قنوات جديدة للبدء في المشاهدة.
                </p>
              </div>
            )}

            {/* Loading */}
            {loading && activeChannel && (
              <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-20">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-orange-500 mb-3"></i>
                <span class="text-sm font-semibold text-slate-200">جاري الاتصال والتحميل...</span>
                <span class="text-xs text-slate-500 mt-1 font-mono text-center px-4 max-w-xs truncate">{activeChannel.name}</span>
              </div>
            )}

            {/* Error state */}
            {errorState && activeChannel && (
              <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center bg-slate-950/98 z-20">
                <i class="fa-solid fa-triangle-exclamation text-red-500 text-5xl mb-2"></i>
                <h4 class="text-base font-bold text-red-400">عذرًا، تعذر تشغيل البث المباشر</h4>
                <p class="text-xs text-slate-300 mt-2 max-w-md font-sans leading-relaxed">
                  {errorState}
                </p>
                <div class="mt-5 flex flex-wrap gap-2.5 justify-center">
                  <button onClick={hardResume} class="px-4 py-2 bg-[#f97316] hover:bg-[#ea580c] text-white text-xs font-bold rounded-lg flex items-center gap-1.5 shadow-md">
                    <i class="fa-solid fa-arrows-rotate"></i>
                    إعادة المحاولة
                  </button>
                  <a href={activeChannel.url} target="_blank" rel="noopener noreferrer" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-semibold rounded-lg border border-slate-700 flex items-center gap-1.5">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    اختبار الرابط بالمتصفح
                  </a>
                </div>
              </div>
            )}

            {/* Video Element */}
            <video 
              ref={videoRef}
              class={`w-full h-full object-contain ${!activeChannel ? 'hidden' : 'block'}`}
              playsInline
            />

            {/* Live indicator badge */}
            {activeChannel && isPlaying && (

    // --- IMPORTER MODAL COMPONENT ---
    function Importer({ onImport, onClose }) {
      const [activeTab, setActiveTab] = useState('hybrid');
      const [loading, setLoading] = useState(false);
      const [statusMessage, setStatusMessage] = useState('');
      const [errorMessage, setErrorMessage] = useState('');

      const [inputText, setInputText] = useState('');
      const [playlistUrl, setPlaylistUrl] = useState('');
      const [corsProxy, setCorsProxy] = useState('allorigins');
      const fileInputRef = useRef(null);

      const processFile = (file) => {
        setLoading(true);
        setStatusMessage('جاري قراءة الملف المرفوع...');
        setErrorMessage('');

        const reader = new FileReader();
        reader.onload = (e) => {
          const text = e.target?.result;
          setInputText(text);
          setLoading(false);
          setStatusMessage(`تم تحميل ملف ${file.name} بنجاح (${(text.length / 1024).toFixed(1)} KB)`);
        };
        reader.onerror = () => {
          setErrorMessage('فشل في قراءة الملف المرفوع.');
          setLoading(false);
        };
        reader.readAsText(file);
      };

      const handleImportHybrid = () => {
        if (!inputText.trim()) {
          setErrorMessage('الرجاء إدخال رابط أو نص قائمة التشغيل أولاً.');
          return;
        }
        setLoading(true);
        setErrorMessage('');
        setStatusMessage('جاري تحليل محتوى البث...');

        setTimeout(() => {
          let parsedChannels = [];
          const trimmedText = inputText.trim();
          const isSingleUrl = /^(https?:\/\/[^\s]+)$/i.test(trimmedText);

          if (isSingleUrl) {
            parsedChannels = parseSingleUrl(trimmedText);
          } else if (trimmedText.includes('#EXTM3U')) {
            parsedChannels = parseM3U(trimmedText);
          } else {
            parsedChannels = parseRawTextUrls(trimmedText);
          }

          setLoading(false);
          if (parsedChannels.length > 0) {
            onImport(parsedChannels, `نجح استيراد ${parsedChannels.length} قناة وبث بنجاح!`);
            onClose();
          } else {
            setErrorMessage('لم يتم العثور على روابط بث صالحة. تأكد من الصيغة.');
          }
        }, 300);
      };

      const handleImportCloud = async () => {
        if (!playlistUrl.trim()) {
          setErrorMessage('الرجاء كتابة رابط القائمة السحابية.');
          return;
        }

        setLoading(true);
        setErrorMessage('');
        setStatusMessage('جاري جلب ملف القنوات السحابي...');

        let finalUrl = playlistUrl.trim();
        if (corsProxy === 'allorigins') {
          finalUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(playlistUrl.trim())}`;
        } else if (corsProxy === 'corsproxy') {
          finalUrl = `https://corsproxy.io/?url=${encodeURIComponent(playlistUrl.trim())}`;
        }

        try {
          let response = await fetch(finalUrl);
          if (!response.ok && corsProxy !== 'direct') {
            response = await fetch(playlistUrl.trim());
          }
          const text = await response.text();
          let parsed = [];
          if (text.includes('#EXTM3U')) {
            parsed = parseM3U(text);
          } else {
            parsed = parseRawTextUrls(text);
          }

          setLoading(false);
          if (parsed.length > 0) {
            onImport(parsed, `نجح استيراد ${parsed.length} قناة من السحابة!`);
            onClose();
          } else {
            setErrorMessage('لم يتم العثور على أي قنوات صالحة في الرابط المزود.');
          }
        } catch {
          setLoading(false);
          setErrorMessage('فشل جلب القنوات. يرجى التحقق من صحة الرابط أو تجربة وكيل CORS آخر.');
        }
      };

      return (
        <div id="importer-modal-wrapper" onClick={(e) => { if (e.target.id === 'importer-modal-wrapper') onClose(); }} class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
          <div class="w-full max-w-2xl bg-[#0f1626] border border-slate-800 rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            
            {/* Header */}
            <div class="p-5 border-b border-slate-800 flex items-center justify-between bg-[#0b0f19]">
              <div class="flex items-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles text-orange-500 text-xl"></i>
                <h2 class="text-xl font-bold bg-gradient-to-l from-orange-400 to-amber-300 bg-clip-text text-transparent">المستورد الذكي الشامل (KiKON TV Engine)</h2>
              </div>
              <button onClick={onClose} class="p-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800">
                <i class="fa-solid fa-xmark text-lg"></i>
              </button>
            </div>

            {/* Tabs */}
            <div class="flex border-b border-slate-800 bg-[#0d1321]">
              <button onClick={() => { setActiveTab('hybrid'); setErrorMessage(''); }} class={`flex-1 py-3 px-4 font-medium text-sm flex items-center justify-center gap-2 border-b-2 transition-all ${activeTab === 'hybrid' ? 'border-orange-500 text-orange-500 bg-orange-500/5' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800/20'}`}>
                <i class="fa-solid fa-cloud-arrow-up"></i>
                لصق ورفع هجين
              </button>
              <button onClick={() => { setActiveTab('cloud'); setErrorMessage(''); }} class={`flex-1 py-3 px-4 font-medium text-sm flex items-center justify-center gap-2 border-b-2 transition-all ${activeTab === 'cloud' ? 'border-orange-500 text-orange-500 bg-orange-500/5' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800/20'}`}>
                <i class="fa-solid fa-link"></i>
                مزامنة رابط سحابي (M3U)
              </button>
            </div>

            {/* Body */}
            <div class="p-6 overflow-y-auto flex-1 space-y-4 custom-scrollbar">
              {loading && (
                <div class="p-4 bg-orange-500/10 border border-orange-500/20 rounded-xl flex items-center gap-3 text-orange-400">
                  <i class="fa-solid fa-circle-notch fa-spin"></i>
                  <div class="text-sm font-medium">{statusMessage}</div>
                </div>
              )}
              {statusMessage && !errorMessage && !loading && (
                <div class="p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl flex items-center gap-3 text-emerald-400">
                  <i class="fa-solid fa-circle-check"></i>
                  <div class="text-sm font-medium">{statusMessage}</div>
                </div>
              )}
              {errorMessage && (
                <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3 text-red-400">
                  <i class="fa-solid fa-triangle-exclamation"></i>
                  <div class="text-sm font-medium">{errorMessage}</div>
                </div>
              )}

              {activeTab === 'hybrid' && (
                <div class="space-y-4">
                  <div class="text-sm text-slate-400">
                    يدعم تحليل قوائم تشغيل <code class="text-orange-400">M3U</code>، استخراج الروابط المباشرة تلقائياً، أو إضافة رابط بث فردي مباشر.
                  </div>
                  <div onClick={() => fileInputRef.current?.click()} class="border-2 border-dashed border-slate-800 hover:border-slate-700 bg-slate-900/40 rounded-xl p-6 text-center cursor-pointer transition-all">
                    <input type="file" ref={fileInputRef} onChange={(e) => { if (e.target.files?.[0]) processFile(e.target.files[0]); }} accept=".m3u,.m3u8,.txt" class="hidden" />
                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-400 mb-2"></i>
                    <p class="text-sm font-semibold text-slate-200">اضغط لتصفح ملف القنوات أو اسحبه هنا</p>
                    <p class="text-xs text-slate-500 mt-1">يدعم ملفات .m3u, .m3u8, .txt</p>
                  </div>
                  <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300 flex items-center gap-2">
                      <i class="fa-solid fa-file-lines text-orange-400"></i>
                      أو الصق محتوى القائمة (M3U) أو روابط البث هنا:
                    </label>
                    <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder={`#EXTM3U\n#EXTINF:-1 group-title="العالم العربي",beIN Sports\nhttp://example.com/channel.m3u8`} class="w-full h-36 px-4 py-3 bg-[#0b0f19] border border-slate-800 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-orange-500 text-sm font-mono text-left" dir="ltr" />
                  </div>
                  <button onClick={handleImportHybrid} class="w-full py-3 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-medium rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-orange-500/15">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    بدء التحليل والاستيراد الذكي
                  </button>
                </div>
              )}

              {activeTab === 'cloud' && (
                <div class="space-y-4">
                  <div class="text-sm text-slate-400">أدخل رابط القائمة الإلكتروني لجلب القنوات وتحديثها من خادم البث السحابي الخاص بك.</div>
                  <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300 flex items-center gap-2">
                      <i class="fa-solid fa-globe text-orange-400"></i>
                      رابط قائمة التشغيل الذكي (URL):
                    </label>
                    <input type="text" value={playlistUrl} onChange={(e) => setPlaylistUrl(e.target.value)} placeholder="https://example.com/playlist.m3u" class="w-full px-4 py-3 bg-[#0b0f19] border border-slate-800 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-orange-500 text-sm font-mono text-left" dir="ltr" />
                  </div>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                      <label class="text-sm font-medium text-slate-300">وكيل تجاوز القيود (CORS Proxy):</label>
                      <select value={corsProxy} onChange={(e) => setCorsProxy(e.target.value)} class="w-full px-3 py-2.5 bg-[#0b0f19] border border-slate-800 rounded-xl text-slate-200 focus:outline-none focus:border-orange-500 text-sm">
                        <option value="allorigins">AllOrigins (موصى به)</option>
                        <option value="corsproxy">CorsProxy.io</option>

                      </select>

                    <div class="text-xs text-slate-500 flex items-end pb-2">خوادم الوكيل تساعد على تخطي قيود الحماية بالمتصفحات التي قد تمنع تحميل القوائم الخارجية.</div>
                  </div>
                  <button onClick={handleImportCloud} class="w-full py-3 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-medium rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-orange-500/15">

            </div>
            <div class="p-5 border-t border-slate-800 bg-[#0b0f19] text-xs text-slate-500 flex justify-between">
              <span>KiKON TV Parser v4.2</span>

    // --- MAIN APP COMPONENT ---
    function App() {
      const [channels, setChannels] = useState([]);
      const [activeChannel, setActiveChannel] = useState(null);

      const [activeTab, setActiveTab] = useState('all');
      const [selectedGroup, setSelectedGroup] = useState('الكل');
      const [searchQuery, setSearchQuery] = useState('');
      const [groupSearchQuery, setGroupSearchQuery] = useState('');
      const [sortOrder, setSortOrder] = useState('default');

      const [showImporter, setShowImporter] = useState(false);
      const [isCategoriesDrawerOpen, setIsCategoriesDrawerOpen] = useState(false);
      const [isChannelsDrawerOpen, setIsChannelsDrawerOpen] = useState(false);
      const [renameChannelId, setRenameChannelId] = useState(null);
      const [renameValue, setRenameValue] = useState('');
      const [toasts, setToasts] = useState([]);

      const [scanProgress, setScanProgress] = useState({
        scanning: false, current: 0, total: 0, verifiedOnline: 0, verifiedOffline: 0
      });

      const isScanningRef = useRef(false);
      const isPausedRef = useRef(false);
      const currentScanIndexRef = useRef(0);
      const abortControllerRef = useRef(null);

      const storagePercentage = useMemo(() => {
        try {
          const serialized = JSON.stringify(channels);
          const ratio = (serialized.length / 5242880) * 100;
          return Math.min(100, Math.max(8, Math.ceil(ratio)));
        } catch {
          return 12;
        }
      }, [channels]);

      // Load Channels
      useEffect(() => {
        const saved = localStorage.getItem('kikontv_channels');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length > 0) {
              setChannels(parsed);
              setActiveChannel(parsed[0]);
              return;
            }
          } catch (e) {
            console.error('Error storage load', e);
          }
        }
        setChannels(STARTER_CHANNELS);
        setActiveChannel(STARTER_CHANNELS[0]);
      }, []);

      const saveChannelsToStorage = (updatedChannels) => {
        try {
          localStorage.setItem('kikontv_channels', JSON.stringify(updatedChannels));
        } catch {
          addToast('ذاكرة المتصفح ممتلئة! تعذر حفظ القائمة الجديدة.', 'error');
        }
      };

      const addToast = (text, type = 'info') => {
        const id = Math.random().toString(36).substring(2, 9);
        setToasts(prev => [...prev, { id, text, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 3500);
      };

      // Categories computation
      const computedCategories = useMemo(() => {
        const groupsMap = new Map();
        const favoritesCount = channels.filter(c => c.favorite).length;

        const tabFiltered = channels.filter(c => {
          if (activeTab === 'all') return true;
          return c.type === activeTab;
        });

        tabFiltered.forEach((chan) => {
          const groupName = chan.group || '🌐 باقة عامة';
          const existing = groupsMap.get(groupName);
          if (existing) {
            existing.count += 1;
          } else {
            groupsMap.set(groupName, { count: 1 });
          }
        });

        const list = [
          { id: 'all', name: 'الكل', count: tabFiltered.length }
        ];

        if (favoritesCount > 0) {
          list.push({ id: 'favorites', name: 'المفضلة ⭐', count: favoritesCount });
        }

        groupsMap.forEach((val, name) => {
          list.push({ id: name, name, count: val.count });
        });

        return list;
      }, [channels, activeTab]);

      useEffect(() => {
        const groupExists = computedCategories.some(cat => cat.id === selectedGroup || (cat.id === 'all' && selectedGroup === 'الكل'));
        if (!groupExists) {
          setSelectedGroup('الكل');
        }
      }, [computedCategories, selectedGroup]);

      const filteredCategories = useMemo(() => {
        if (!groupSearchQuery.trim()) return computedCategories;
        const query = groupSearchQuery.toLowerCase();
        return computedCategories.filter(cat => 
          cat.name.toLowerCase().includes(query) || cat.id === 'all' || cat.id === 'favorites'
        );
      }, [computedCategories, groupSearchQuery]);

      const filteredChannels = useMemo(() => {
        let result = channels;

        if (activeTab !== 'all') {
          result = result.filter(c => c.type === activeTab);
        }

        if (selectedGroup === 'المفضلة ⭐') {
          result = result.filter(c => c.favorite);
        } else if (selectedGroup !== 'الكل' && selectedGroup !== 'all') {
          result = result.filter(c => c.group === selectedGroup);
        }

        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          result = result.filter(c => 
            c.name.toLowerCase().includes(q) || 
            c.group.toLowerCase().includes(q) ||
            c.url.toLowerCase().includes(q)
          );
        }

        if (sortOrder === 'newest') {
          result = [...result].sort((a, b) => b.importedAt - a.importedAt);
        } else if (sortOrder === 'alphabetical') {
          result = [...result].sort((a, b) => a.name.localeCompare(b.name, 'ar'));
        }

        return result;
      }, [channels, activeTab, selectedGroup, searchQuery, sortOrder]);

      // Validator Logic
      const testStreamAlive = async (url, signal) => {
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
          return true;
        }
        try {
          const response = await fetch(url, { method: 'HEAD', signal, mode: 'cors' });
          return response.ok || response.status < 400;
        } catch {
          try {
            const response = await fetch(url, { method: 'GET', signal, mode: 'cors', headers: { 'Range': 'bytes=0-1' } });
            return response.ok || response.status < 400;
          } catch {
            return false;
          }
        }
      };

      const startScan = (globalScan) => {
        if (scanProgress.scanning) return;
        const listToScan = globalScan ? channels : channels.filter(c => {
          const matchesTab = activeTab === 'all' || c.type === activeTab;
          const matchesGroup = selectedGroup === 'الكل' || c.group === selectedGroup;
          return matchesTab && matchesGroup;
        });

        if (listToScan.length === 0) {
          addToast('لا توجد قنوات صالحة للفحص.', 'warning');
          return;
        }

        isScanningRef.current = true;
        isPausedRef.current = false;
        currentScanIndexRef.current = 0;

        setScanProgress({
          scanning: true, current: 0, total: listToScan.length, verifiedOnline: 0, verifiedOffline: 0
        });

        addToast('بدء فحص القنوات والتحقق من صلاحيتها للتأكد من حذف الروابط التالفة...', 'info');
        runScanLoop(listToScan);
      };

      const runScanLoop = async (list) => {
        let onlineCount = 0;
        let offlineCount = 0;
        let workingChannelsList = [...channels];

        while (currentScanIndexRef.current < list.length && isScanningRef.current) {
          if (isPausedRef.current) {
            await new Promise(r => setTimeout(r, 400));
            continue;
          }

          const chan = list[currentScanIndexRef.current];
          const controller = new AbortController();
          abortControllerRef.current = controller;
          const timeoutId = setTimeout(() => controller.abort(), 900);

          let isAlive = false;
          try {
            isAlive = await testStreamAlive(chan.url, controller.signal);
          } catch {
            isAlive = false;
          } finally {
            clearTimeout(timeoutId);
          }

          if (isAlive) {
            onlineCount++;
            workingChannelsList = workingChannelsList.map(c => 
              c.id === chan.id ? { ...c, status: 'online' } : c
            );
          } else {
            offlineCount++;
            workingChannelsList = workingChannelsList.filter(c => c.id !== chan.id);
            if (activeChannel && activeChannel.id === chan.id) {
              setActiveChannel(null);
            }
          }

          setChannels(workingChannelsList);
          saveChannelsToStorage(workingChannelsList);
          currentScanIndexRef.current++;

          setScanProgress(prev => ({
            ...prev,
            current: currentScanIndexRef.current,
            verifiedOnline: onlineCount,
            verifiedOffline: offlineCount
          }));
        }

        if (currentScanIndexRef.current >= list.length) {
          addToast(`اكتمل الفحص! قنوات تعمل: ${onlineCount}، قنوات ميتة محذوفة: ${offlineCount}`, 'success');
          setScanProgress(prev => ({ ...prev, scanning: false }));
          isScanningRef.current = false;
        }
      };

      const handleImportSuccess = (imported, message) => {
        const merged = [...channels];
        let addedCount = 0;
        imported.forEach(newChan => {
          const exists = merged.some(c => c.url === newChan.url);
          if (!exists) {
            merged.push(newChan);
            addedCount++;
          }
        });

        setChannels(merged);
        saveChannelsToStorage(merged);
        if (merged.length > 0 && !activeChannel) {
          setActiveChannel(merged[0]);
        }
        addToast(message + ` (تم جلب ${addedCount} قناة جديدة)`, 'success');
      };

      const deleteChannel = (id) => {
        const updated = channels.filter(c => c.id !== id);
        setChannels(updated);
        saveChannelsToStorage(updated);
        if (activeChannel && activeChannel.id === id) {
          setActiveChannel(updated.length > 0 ? updated[0] : null);
        }
        addToast('تم حذف القناة من مكتبتك.', 'info');
      };

      const toggleFavorite = (id, e) => {
        e.stopPropagation();
        const updated = channels.map(c => 
          c.id === id ? { ...c, favorite: !c.favorite } : c
        );
        setChannels(updated);
        saveChannelsToStorage(updated);
        const item = updated.find(c => c.id === id);
        if (item) {
          addToast(item.favorite ? 'تمت إضافة القناة للمفضلة ⭐' : 'تمت إزالة القناة من المفضلة', 'success');
        }
      };

      const startRename = (id, currentName, e) => {
        e.stopPropagation();
        setRenameChannelId(id);
        setRenameValue(currentName);
      };

      const submitRename = () => {
        if (!renameValue.trim() || !renameChannelId) return;
        const updated = channels.map(c => 
          c.id === renameChannelId ? { ...c, name: renameValue.trim() } : c
        );
        setChannels(updated);
        saveChannelsToStorage(updated);
        if (activeChannel && activeChannel.id === renameChannelId) {
          setActiveChannel({ ...activeChannel, name: renameValue.trim() });
        }
        setRenameChannelId(null);
        addToast('تم تعديل الاسم بنجاح.', 'success');
      };

      const hardResetDatabase = () => {
        const confirmReset = window.confirm('تحذير! هل تريد بالتأكيد تصفير القنوات واستعادة القنوات الافتراضية؟');
        if (!confirmReset) return;
        localStorage.removeItem('kikontv_channels');
        setChannels(STARTER_CHANNELS);
        setActiveChannel(STARTER_CHANNELS[0]);
        setSelectedGroup('الكل');
        setActiveTab('all');
        addToast('تمت إعادة ضبط القنوات الافتراضية.', 'warning');
      };

      const handleExportPlaylist = () => {
        if (channels.length === 0) {
          addToast('لا توجد قنوات لتصديرها.', 'error');
          return;
        }
        const m3uContent = exportToM3U(channels);
        const blob = new Blob([m3uContent], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `kikontv_playlist_${Date.now()}.m3u`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        addToast('تم تصدير ملف M3U بنجاح!', 'success');
      };

      return (
        <div class="min-h-screen bg-[#070a12] text-slate-100 flex flex-col font-sans relative">
          
          {/* TOASTS PANEL */}
          <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none">
            {toasts.map(t => {
              let bg = 'bg-[#0f1626] border-slate-800 text-slate-300';
              let icon = <i class="fa-solid fa-circle-info text-blue-400"></i>;
              if (t.type === 'success') {
                bg = 'bg-emerald-950/90 border-emerald-500/30 text-emerald-100';
                icon = <i class="fa-solid fa-circle-check text-emerald-400"></i>;
              } else if (t.type === 'error' || t.type === 'warning') {
                bg = 'bg-red-950/90 border-red-500/30 text-red-100';
                icon = <i class="fa-solid fa-triangle-exclamation text-red-400"></i>;
              }
              return (
                <div key={t.id} class={`p-4 rounded-2xl border flex items-start gap-3 shadow-2xl backdrop-blur-md animate-slide-up pointer-events-auto ${bg}`}>
                  <div class="shrink-0 mt-0.5">{icon}</div>
                  <div class="text-sm font-medium leading-relaxed">{t.text}</div>
                </div>
              );
            })}
          </div>

          {/* HEADER NAV */}
          <header class="sticky top-0 z-40 bg-[#0f1626]/95 backdrop-blur-md border-b border-slate-800 h-16 px-6 shadow-xl flex items-center justify-between shrink-0">
            <div class="flex items-center gap-4">
              <div class="bg-gradient-to-br from-[#f97316] to-[#f59e0b] p-2.5 rounded-xl shadow-lg shrink-0">
                <i class="fa-solid fa-tv text-white text-lg"></i>
              </div>
              <h1 class="text-lg font-black text-white leading-none">
                KiKON <span class="text-[#f97316]">TV</span> <span class="text-[9px] font-bold text-slate-500 bg-slate-800/80 px-2 py-0.5 rounded ml-1 uppercase">Ultimate</span>
              </h1>
            </div>

            {/* Tabs switcher (Desktop) */}
            <div class="hidden md:flex bg-[#070a12] p-1 rounded-full border border-slate-800">
              {[
                { id: 'all', name: 'الكل' },
                { id: 'live', name: 'مباشر' },
                { id: 'vod', name: 'أفلام' },
                { id: 'series', name: 'مسلسلات' }
              ].map(tab => (
                <button key={tab.id} onClick={() => { setActiveTab(tab.id); setSelectedGroup('الكل'); }} class={`px-6 py-1.5 rounded-full text-xs font-bold transition-all ${activeTab === tab.id ? 'bg-[#f97316] text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800/40'}`}>
                  {tab.name}
                </button>
              ))}
            </div>

            {/* Quick Actions */}
            <div class="flex items-center gap-3">
              <div class="hidden lg:flex flex-col items-end">
                <span class="text-[9px] uppercase text-slate-500 font-bold tracking-widest leading-none">ذاكرة التخزين</span>
                <div class="w-20 h-1 bg-slate-800 rounded-full mt-1 overflow-hidden">
                  <div class="h-full bg-gradient-to-r from-[#f97316] to-[#f59e0b] transition-all" style={{ width: `${storagePercentage}%` }} />
                </div>
              </div>
              
              <button onClick={() => setShowImporter(true)} class="px-3.5 py-2 bg-orange-500 hover:bg-orange-600 text-white font-semibold text-xs rounded-xl flex items-center gap-1.5 transition-all shadow-md shadow-orange-500/10">
                <i class="fa-solid fa-plus"></i>
                <span class="hidden sm:inline">المستورد الذكي</span>
              </button>

              <button onClick={handleExportPlaylist} title="تصدير بصيغة M3U" class="p-2 bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-xl text-slate-300 hover:text-white transition-all">
                <i class="fa-solid fa-download text-sm"></i>
              </button>

              <button onClick={hardResetDatabase} title="إعادة ضبط المصنع" class="p-2 bg-red-950/20 hover:bg-red-950/40 border border-red-900/30 rounded-xl text-red-400 transition-all">
                <i class="fa-solid fa-power-off text-sm"></i>
              </button>

              <button onClick={() => setIsCategoriesDrawerOpen(!isCategoriesDrawerOpen)} class="p-2 bg-slate-900 border border-slate-800 rounded-xl text-slate-300 md:hidden">
                <i class="fa-solid fa-sliders text-sm"></i>
              </button>

              <button onClick={() => setIsChannelsDrawerOpen(!isChannelsDrawerOpen)} class="p-2 bg-slate-900 border border-slate-800 rounded-xl text-slate-300 md:hidden">
                <i class="fa-solid fa-bars text-sm"></i>
              </button>
            </div>
          </header>

          {/* Mobile Tab Swapper */}
          <div class="flex md:hidden bg-[#0d1321] border-b border-slate-800 p-2 overflow-x-auto gap-1">
            {[
              { id: 'all', name: 'الكل' },
              { id: 'live', name: 'مباشر' },
              { id: 'vod', name: 'أفلام' },
              { id: 'series', name: 'مسلسلات' }
            ].map(tab => (
              <button key={tab.id} onClick={() => { setActiveTab(tab.id); setSelectedGroup('الكل'); }} class={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all shrink-0 ${activeTab === tab.id ? 'bg-orange-500 text-white' : 'text-slate-400'}`}>
                {tab.name}
              </button>
            ))}
          </div>

          {/* MAIN GRID */}
          <main class="flex-1 grid grid-cols-1 md:grid-cols-5 overflow-hidden h-[calc(100vh-64px)]">
            
            {/* COLUMN 1: Categories Sidebar */}
            <aside class={`col-span-1 bg-[#0f1626] border-l border-slate-800 p-4 overflow-y-auto md:flex flex-col gap-4 z-30 custom-scrollbar ${isCategoriesDrawerOpen ? 'fixed inset-y-0 right-0 w-80 shadow-2xl bg-[#0f1626]/98 backdrop-blur-md' : 'hidden md:flex'}`}>
              <div class="flex items-center justify-between md:hidden border-b border-slate-800 pb-3">
                <span class="text-sm font-bold text-slate-200">تصنيفات وباقات البث</span>
                <button onClick={() => setIsCategoriesDrawerOpen(false)} class="p-1 rounded-lg hover:bg-slate-800 text-slate-400">
                  <i class="fa-solid fa-xmark text-lg"></i>
                </button>
              </div>

              <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">باقات القنوات والمجموعات</div>
              
              <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-3 text-slate-500"></i>
                <input type="text" value={groupSearchQuery} onChange={(e) => setGroupSearchQuery(e.target.value)} placeholder="بحث عن باقة..." class="w-full pr-9 pl-3 py-2 bg-[#070a12] border border-slate-700/80 rounded-xl text-xs text-slate-300 placeholder-slate-500 focus:outline-none focus:border-[#f97316]" />
              </div>

              <div class="flex flex-col gap-1.5 overflow-y-auto flex-1 pr-1 custom-scrollbar">
                {filteredCategories.map((cat) => {
                  const isActive = selectedGroup === cat.id || (cat.id === 'all' && selectedGroup === 'الكل');
                  const isFav = cat.id === 'favorites';
                  return (
                    <button key={cat.id} onClick={() => { setSelectedGroup(cat.id === 'all' ? 'الكل' : cat.id); setIsCategoriesDrawerOpen(false); }} class={`w-full text-right p-2.5 rounded-lg text-xs flex items-center justify-between transition-all ${isActive ? 'bg-[#1e293b] border-r-4 border-[#f97316] text-white font-bold' : 'hover:bg-slate-800/40 text-slate-400 hover:text-slate-200'}`}>
                      <div class="flex items-center gap-2 truncate">
                        <span class="text-sm">
                          {cat.name.includes('الكل') ? '🌍' : isFav ? '⭐' : '📡'}
                        </span>
                        <span class="truncate max-w-[150px]">{cat.name}</span>
                      </div>
                      <span class={`text-[10px] px-2 py-0.5 rounded-full font-bold ${isActive ? 'bg-[#f97316] text-white' : 'bg-slate-800 text-slate-400'}`}>
                        {cat.count}
                      </span>
                    </button>
                  );
                })}
              </div>
            </aside>

            {/* COLUMN 2: Central Video Stage */}
            <section class="col-span-1 md:col-span-3 bg-[#070a12] p-4 overflow-y-auto flex flex-col gap-4 custom-scrollbar">
              <VideoPlayer activeChannel={activeChannel} onToast={addToast} />

              {/* Scan progress bar */}
              {scanProgress.scanning && (
                <div class="bg-[#0f1626] border border-orange-500/20 p-4 rounded-2xl shadow-xl space-y-3">
                  <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                      <i class="fa-solid fa-circle-notch fa-spin text-orange-500"></i>
                      <span class="text-xs font-bold text-orange-400">جاري فحص ومسح القنوات الميتة...</span>
                    </div>
                    <div class="flex gap-2">
                      <button onClick={() => { isPausedRef.current = !isPausedRef.current; addToast(isPausedRef.current ? 'تم الإيقاف المؤقت' : 'تم استئناف الفحص', 'info'); }} class="px-2.5 py-1 bg-slate-800 border border-slate-700 rounded-lg text-[10px] text-slate-300">
                        {isPausedRef.current ? 'استئناف' : 'تعليق'}
                      </button>
                      <button onClick={() => { isScanningRef.current = false; setScanProgress(p => ({ ...p, scanning: false })); addToast('تم إلغاء الفحص', 'warning'); }} class="px-2.5 py-1 bg-red-950/50 border border-red-900/40 rounded-lg text-[10px] text-red-400">
                        إلغاء
                      </button>
                    </div>
                  </div>
                  <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                    <div class="bg-gradient-to-r from-orange-500 to-amber-500 h-full transition-all duration-300" style={{ width: `${(scanProgress.current / scanProgress.total) * 100}%` }} />
                  </div>
                  <div class="grid grid-cols-3 text-[10px] font-mono text-center text-slate-400">
                    <div>مقدمة: {scanProgress.current} / {scanProgress.total}</div>
                    <div class="text-emerald-400">✅ يعمل: {scanProgress.verifiedOnline}</div>
                    <div class="text-red-400">❌ تالف ومحذوف: {scanProgress.verifiedOffline}</div>
                  </div>
                </div>
              )}

              {/* Actions panel */}
              {activeChannel && (
                <div class="bg-[#0f1626] border border-slate-800/80 p-4 rounded-2xl shadow-xl flex flex-col md:flex-row items-center justify-between gap-4">
                  <div class="flex items-center gap-2 w-full md:w-auto">
                    <button onClick={(e) => toggleFavorite(activeChannel.id, e)} class={`px-3 py-2 border rounded-xl flex items-center gap-1.5 text-xs font-bold transition-all ${activeChannel.favorite ? 'bg-amber-500/10 border-amber-500/40 text-amber-400' : 'bg-slate-900 border-slate-800 text-slate-400'}`}>
                      <i class={`fa-solid fa-heart ${activeChannel.favorite ? 'text-amber-400' : ''}`}></i>
                      {activeChannel.favorite ? 'مفضلة مضافة' : 'إضافة للمفضلة'}
                    </button>

                    {renameChannelId !== activeChannel.id ? (
                      <button onClick={(e) => startRename(activeChannel.id, activeChannel.name, e)} class="px-3 py-2 bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-xl text-xs font-bold flex items-center gap-1.5">
                        <i class="fa-solid fa-edit text-xs"></i>
                        تعديل الاسم
                      </button>
                    ) : (
                      <div class="flex items-center gap-1 bg-[#070a12] p-1 rounded-xl border border-orange-500/30">
                        <input type="text" value={renameValue} onChange={(e) => setRenameValue(e.target.value)} class="px-2 py-1 bg-transparent text-xs text-slate-200 focus:outline-none w-28" />
                        <button onClick={submitRename} class="p-1 text-emerald-400">
                          <i class="fa-solid fa-check"></i>
                        </button>
                        <button onClick={() => setRenameChannelId(null)} class="p-1 text-red-400">
                          <i class="fa-solid fa-xmark"></i>
                        </button>
                      </div>
                    )}

                    <button onClick={() => deleteChannel(activeChannel.id)} class="px-3 py-2 bg-red-950/20 hover:bg-red-950/40 text-red-400 border border-red-950/30 rounded-xl text-xs font-bold flex items-center gap-1.5">
                      <i class="fa-solid fa-trash-can text-xs"></i>
                      حذف القناة
                    </button>
                  </div>

                  <div class="flex gap-2 w-full md:w-auto">
                    <button onClick={() => startScan(false)} disabled={scanProgress.scanning} class="px-3 py-2 bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-xl text-[10px] font-bold flex items-center gap-1.5">
                      <i class="fa-solid fa-arrows-rotate"></i>
                      فحص الباقة الحالية
                    </button>
                    <button onClick={() => startScan(true)} disabled={scanProgress.scanning} class="px-3 py-2 bg-orange-500/10 hover:bg-orange-500/20 border border-orange-500/20 text-orange-400 rounded-xl text-[10px] font-bold flex items-center gap-1.5">
                      <i class="fa-solid fa-sliders"></i>
                      فحص شامل ومسح التالف
                    </button>
                  </div>
                </div>
              )}

              {/* Quick Info Tips */}
              <div class="bg-[#0f1626] border border-slate-800/60 p-4 rounded-xl flex items-start gap-3">
                <i class="fa-solid fa-circle-question text-orange-500 text-lg shrink-0 mt-0.5"></i>
                <div class="text-xs text-slate-400 leading-relaxed space-y-1">
                  <div class="font-bold text-slate-200 text-xs mb-1">دليل الاستخدام وملاحظات الدعم:</div>
                  <div>• المشغل يدعم ملفات القنوات <code class="text-orange-400 font-bold">M3U/M3U8</code> والتدفق من نوع <code class="text-amber-500 font-bold">MPEG-TS (.ts)</code>.</div>
                  <div>• <strong class="text-orange-400">تجاوز قيود CORS:</strong> تأكد من تفعيل إضافة تجاوز الـ CORS في متصفحك إذا لم تعمل معك الروابط الخارجية مباشرة.</div>
                </div>
              </div>
            </section>

            {/* COLUMN 3: Channels List Sidebar */}
            <aside class={`col-span-1 bg-[#0f1626] border-r border-slate-800 p-4 overflow-y-auto md:flex flex-col gap-4 z-30 custom-scrollbar ${isChannelsDrawerOpen ? 'fixed inset-y-0 left-0 w-80 shadow-2xl bg-[#0f1626]/98 backdrop-blur-md' : 'hidden md:flex'}`}>
              <div class="flex items-center justify-between md:hidden border-b border-slate-800 pb-3">
                <span class="text-sm font-bold text-slate-200">قائمة البث للقنوات ({filteredChannels.length})</span>
                <button onClick={() => setIsChannelsDrawerOpen(false)} class="p-1 rounded-lg hover:bg-slate-800 text-slate-400">
                  <i class="fa-solid fa-xmark text-lg"></i>
                </button>
              </div>

              <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-slate-400">باقة: {selectedGroup}</span>
                <span class="text-[10px] bg-slate-800 text-slate-300 font-bold px-2 py-0.5 rounded-full">{filteredChannels.length} قناة</span>
              </div>

              <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-3 text-slate-500"></i>
                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="بحث بالاسم أو الرابط..." class="w-full pr-9 pl-3 py-2 bg-[#070a12] border border-slate-700/80 rounded-xl text-xs text-slate-300 placeholder-slate-500 focus:outline-none focus:border-[#f97316]" />
              </div>

              <div class="flex items-center justify-between text-[11px] border-b border-slate-800 pb-2">
                <span class="text-slate-500">
                  <i class="fa-solid fa-sort"></i> ترتيب القنوات:
                </span>
                <select value={sortOrder} onChange={(e) => setSortOrder(e.target.value)} class="bg-transparent text-slate-300 border-none font-bold text-[11px] focus:outline-none cursor-pointer">
                  <option value="default">الترتيب الأصلي</option>
                  <option value="newest">الأحدث أولاً</option>
                  <option value="alphabetical">أبجدي عربي</option>
                </select>
              </div>

              <div class="flex flex-col gap-2 overflow-y-auto flex-1 pr-1 custom-scrollbar">
                {filteredChannels.map((chan, idx) => {
                  const isActive = activeChannel && activeChannel.id === chan.id;
                  return (
                    <div key={chan.id} onClick={() => { setActiveChannel(chan); setIsChannelsDrawerOpen(false); }} class={`p-2.5 rounded-xl border flex items-center justify-between gap-2 transition-all ${isActive ? 'bg-[#1e293b] border-[#f97316]/50 shadow-lg' : 'bg-slate-900/40 border-slate-800/40 hover:bg-slate-800/50'}`}>
                      <div class="flex items-center gap-2.5 min-w-0">
                        {chan.logo ? (
                          <img src={chan.logo} alt={chan.name} referrerPolicy="no-referrer" onError={(e) => { e.target.style.display = 'none'; }} class="w-10 h-10 rounded-lg bg-slate-950 border object-cover shrink-0" />
                        ) : (
                          <div class="w-10 h-10 rounded-lg bg-slate-800 border border-slate-700 text-slate-400 flex items-center justify-center font-bold font-mono text-[11px] shrink-0">
                            {idx + 1}
                          </div>
                        )}
                        <div class="flex flex-col min-w-0">
                          <span class={`text-xs font-bold truncate leading-tight ${isActive ? 'text-white' : 'text-slate-300'}`}>{chan.name}</span>
                          <span class="text-[9px] text-slate-500 truncate mt-0.5">الآن: بث حي مستمر</span>
                        </div>
                      </div>

                      <div class="flex items-center gap-1.5 shrink-0">
                        <button onClick={(e) => { e.stopPropagation(); toggleFavorite(chan.id, e); }} class={`p-1 rounded ${chan.favorite ? 'text-amber-400 bg-amber-500/10' : 'text-slate-500 hover:text-amber-400'}`}>
                          <i class="fa-solid fa-heart text-xs"></i>
                        </button>
                        <button onClick={(e) => { e.stopPropagation(); deleteChannel(chan.id); }} class="p-1 text-slate-500 hover:text-red-400">
                          <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </aside>
          </main>

          {/* Importer Modal */}
          {showImporter && (
            <Importer onImport={handleImportSuccess} onClose={() => setShowImporter(false)} />
          )}

        </div>
      );
    }

    // Mount to DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
