<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<title>KiKON TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
<style id="app-style">
  :root{
    --bg-0:#000; --bg-1:#0a0a0a; --bg-2:#141414; --bg-3:#1c1c1e;
    --line:#2a2a2c; --line-2:#3a3a3c;
    --text:#f5f5f7; --text-2:#a1a1a6; --text-3:#6e6e73;
    --accent:#0a84ff; --accent-2:#30d158; --danger:#ff453a; --warn:#ff9f0a;
    --radius:14px;
  }
  *{-webkit-tap-highlight-color:transparent;}
  html,body{font-family:'Cairo','SF Pro Display','Segoe UI',system-ui,sans-serif; background:var(--bg-0); color:var(--text);}
  body{overscroll-behavior:none;}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#4a4a4c}

  .glass{background:rgba(20,20,20,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid var(--line);}
  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.55rem .9rem;border-radius:10px;font-weight:600;font-size:.85rem;border:1px solid var(--line);background:var(--bg-3);color:var(--text);transition:all .18s ease;cursor:pointer;user-select:none;}
  .btn:hover{background:#2a2a2c;border-color:var(--line-2);}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn-primary:hover{background:#0071e3;border-color:#0071e3;}
  .btn-danger{background:transparent;border-color:#3a2a2c;color:var(--danger);}
  .btn-danger:hover{background:rgba(255,69,58,.12);}
  .btn-ghost{background:transparent;border-color:transparent;}
  .btn-ghost:hover{background:var(--bg-3);}
  .chip{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .6rem;border-radius:999px;background:var(--bg-3);border:1px solid var(--line);font-size:.72rem;color:var(--text-2);}

  .input{width:100%;padding:.65rem .85rem;background:var(--bg-3);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .15s;}
  .input:focus{border-color:var(--accent);}
  .input::placeholder{color:var(--text-3);}

  /* Layout panels */
  .panel{background:var(--bg-1);border:1px solid var(--line);}
  .divider{height:1px;background:var(--line);}

  /* Channel row */
  .ch-row{display:flex;align-items:center;gap:.6rem;padding Kent:.5rem .65rem;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
  .ch-row:hover{background:var(--bg-2);}
  .ch-row.active{background:linear-gradient(135deg,rgba(10,132,255,.18),rgba(10,132,255,.06));border-color:rgba(10,132,255,.35);}
  .ch-logo{width:38px;height:38px;flex-shrink:0;border-radius:8px;background:var(--bg-3);object-fit:contain;padding:3px;border:1px solid var(--line);}
  .ch-logo-fallback{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,#2c2c2e,#1c1c1e);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text-2);font-size:.75rem;flex-shrink:0;border:1px solid var(--line);}

  /* Group tile */
  .group-tile{display:flex;align-items:center;gap:.6rem;padding:.6rem .7rem;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent;}
  .group-tile:hover{background:var(--bg-2);}
  .group-tile.active{background:linear-gradient(135deg,rgba(48,209,88,.14),rgba(48,209,88,.04));border-color:rgba(48,209,88,.3);}
  .group-icon{width:32px;height:32px;border-radius:8px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}

  /* Player */
  #playerWrap{position:relative;background:#000;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #video{width:100%;height:100%;background:#000;transition:transform .2s ease;}
  #video.fit-contain{object-fit:contain;}
  #video.fit-cover{object-fit:cover;}
  #video.fit-fill{object-fit:fill;}
  #video.fit-16x9{object-fit:contain;aspect-ratio:16/9;}
  #video.fit-4x3{object-fit:contain;aspect-ratio:4/3;}
  #video.fit-21x9{object-fit:contain;aspect-ratio:21/9;}
  #video.fit-zoom{object-fit:cover;transform:scale(1.15);}

  .player-overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;}
  .loader{width:56px;height:56px;border:3px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .player-title-bar{position:absolute;top:0;left:0;right:0;padding:14px 18px;background:linear-gradient(180deg,rgba(0,0,0,.75),transparent);pointer-events:none;opacity:0;transition:opacity .25s;}
  #playerWrap:hover .player-title-bar,#playerWrap.controls-on .player-title-bar{opacity:1;}

  .player-controls{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(0deg,rgba(0,0,0,.75),transparent);display:flex;align-items:center;gap:.5rem;opacity:0;transition:opacity .25s;}
  #playerWrap:hover .player-controls,#playerWrap.controls-on .player-controls{opacity:1;}
  .pc-btn{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);color:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
  .pc-btn:hover{background:rgba(255,255,255,.16);}

  /* Modal */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:60;display:flex;align-items:center;justify-content:center;padding:1rem;}
  .modal{width:100%;max-width:640px;max-height:88vh;background:var(--bg-1);border:1px solid var(--line);border-radius:18px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.6);}
  .modal-head{padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
  .modal-body{padding:1.1rem 1.2rem;overflow-y:auto;}
  .tabs{display:flex;gap:.4rem;padding:.6rem 1rem;background:var(--bg-2);border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .tab{padding:.45rem .8rem;border-radius:8px;font-size:.8rem;color:var(--text-2);cursor:pointer;transition:all .15s;}
  .tab.active{background:var(--bg-3);color:var(--text);}

  /* Toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;}
  .toast{background:var(--bg-3);border:1px solid var(--line-2);color:var(--text);padding:.7rem 1rem;border-radius:12px;font-size:.85rem;box-shadow:0 12px 28px rgba(0,0,0,.5);animation:tin .25s ease;pointer-events:auto;}
  .toast.ok{border-color:rgba(48,209,88,.5);} .toast.err{border-color:rgba(255,69,58,.5);}
  @keyframes tin{from{opacity:0;transform:translateY(8px);}}

  /* Empty state */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text-3);padding:2rem 1rem;gap:.8rem;}

  /* Sidebar collapse on mobile */
  .side-left,.side-right{transition:transform .28s ease, width .28s ease;}
  @media (max-width: 900px){
    .side-left{position:fixed;top:52px;bottom:0;left:0;width:80%;max-width:320px;z-index:40;transform:translateX(-100%);background:var(--bg-1);border-right:1px solid var(--line);}
    .side-right{position:fixed;top:52px;bottom:0;right:0;width:80%;max-width:320px;z-index:40;transform:translateX(100%);background:var(--bg-1);border-left:1px solid var(--line);}
    body[dir="rtl"] .side-left{transform:translateX(100%);left:auto;right:0;border-right:none;border-left:1px solid var(--line);}
    body[dir="rtl"] .side-right{transform:translateX(-100%);right:auto;left:0;border-left:none;border-right:1px solid var(--line);}
    .side-left.open,.side-right.open{transform:translateX(0);}
    .mobile-toggle{display:inline-flex !important;}
  }
  .mobile-toggle{display:none;}

  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;display:none;}
  .backdrop.on{display:block;}

  /* Selects */
  select.input{appearance:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a1a1a6'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:left .6rem center;background-size:18px;padding-left:2rem;}

  .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--bg-3);border:1px solid var(--line);padding:.1rem .35rem;border-radius:5px;font-size:.72rem;color:var(--text-2);}

  .nowrap{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fade-in{animation:fi .3s ease;}
  @keyframes fi{from{opacity:0;transform:translateY(4px);}}
</style>
</head>

<script id="app-script">
/* ================= KiKON TV — single-file app ================= */
(function(){
  'use strict';

  /* ---------- I18N ---------- */
  const I18N = {
    ar:{
      appName:"KiKON TV",
      groups:"الباقات", channels:"القنوات", favorites:"المفضلة", all:"الكل",

      scan:"فحص القنوات", scanning:"جارٍ الفحص…", scanDone:"انتهى الفحص",
      dead:"قناة غير شغالة", removeDead:"حذف غير الشغالة",
      quickUrl:"تشغيل رابط مباشر", pasteUrl:"الصق رابط M3U8/TS/MP4 هنا",
      openFile:"فتح ملف محلي", zoom:"تكبير",

      xtreamHint:"مثال: http://server.com:8080",
      quality:"الجودة", auto:"تلقائي",
      pip:"صورة داخل صورة", fs:"ملء الشاشة",
      ok:"تم", err:"خطأ", info:"تنبيه",
      selectDest:"اختر باقة الوجهة",
      chanCount:"قناة",
      exportSettings: "إعدادات التصدير والتنزيل",
      exportAll: "تصدير جميع القنوات المتاحة",
      exportFav: "تصدير القنوات المفضلة فقط",
      exportGroup: "تصدير الباقة الحالية النشطة",
      exportBtn: "تصدير كملف M3U"
    },
    en:{
      appName:"KiKON TV",
      groups:"Groups", channels:"Channels", favorites:"Favorites", all:"All",
      search:"Search…", searchGroups:"Search groups…",
      import:"Import", importList:"Import Playlist", clearData:"Clear Data", settings:"Settings",
      addM3U:"M3U URL / File", xtream:"Xtream Account", txt:"Smart TXT",
      m3uUrl:"M3U URL", pasteM3U:"Or paste M3U content here",
      host:"Host", user:"Username", pass:"Password",
      loadFile:"Load from file", parseFile:"Parse file",
      importBtn:"Import", cancel:"Cancel", save:"Save",
      noChannels:"No channels — import a playlist to start",
      pickChannel:"Pick a channel to start watching",
      loading:"Loading…", connecting:"Connecting to stream…",
      offline:"Connection dropped — reconnecting…",
      addedOk:"Imported successfully", addedFail:"Import failed",
      cleared:"Data cleared",
      scan:"Scan channels", scanning:"Scanning…", scanDone:"Scan complete",
      dead:"dead channels", removeDead:"Remove dead",
      quickUrl:"Play direct URL", pasteUrl:"Paste M3U8/TS/MP4 URL",
      openFile:"Open local file", zoom:"Zoom",
      confirmClear:"All channels, favorites and settings will be erased. Continue?",
      lang:"Language", fitOriginal:"Original", fitFill:"Fill", fitStretch:"Stretch",
      mute:"Mute", unmute:"Unmute", play:"Play", pause:"Pause", live:"LIVE",
      moveTo:"Move to group…", newGroup:"New group", rename:"Rename",
      addFav:"Add to favorites", removeFav:"Remove from favorites",
      moveUp:"Move up", moveDown:"Move down", del:"Delete",
      totalChannels:"channels", totalGroups:"groups",
      m3uHint:"Supports direct M3U/M3U8 URLs or paste raw content",
      txtHint:"Upload a text file containing Xtream host/user/pass in any format",
      xtreamHint:"Example: http://server.com:8080",
      quality:"Quality", auto:"Auto",
      pip:"Picture-in-picture", fs:"Fullscreen",
      ok:"OK", err:"Error", info:"Info",
      selectDest:"Select destination group",
      chanCount:"ch",
      exportSettings: "Export & Download Options",
      exportAll: "Export All Current Channels",
      exportFav: "Export Favorites Only",
      exportGroup: "Export Active Group Only",
      exportBtn: "Export as M3U"
    }
  };

  /* ---------- State ---------- */
  const LS_KEY = "kikon.tv.v1";
  const state = {
    lang: "ar",
    channels: [],   // {id, name, url, logo, group, fav, type, meta}
    groupOrder: [], // custom order of group names
    activeGroup: "__all__",
    activeChannelId: null,
    search: "",
    fit: "contain",
    muted: false,
    volume: 1,
  };

  function save(){
    try{
      localStorage.setItem(LS_KEY, JSON.stringify({
        lang:state.lang, channels:state.channels, groupOrder:state.groupOrder,
        activeGroup:state.activeGroup, activeChannelId:state.activeChannelId,
        fit:state.fit, muted:state.muted, volume:state.volume
      }));
    }catch(e){}
  }
  function load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      Object.assign(state, d);
    }catch(e){}
  }
  load();

  const t = (k)=> (I18N[state.lang] && I18N[state.lang][k]) || I18N.en[k] || k;

  /* ---------- Utils ---------- */
  const $ = (s,ctx)=> (ctx||document).querySelector(s);
  const $$ = (s,ctx)=> Array.from((ctx||document).querySelectorAll(s));
  const uid = ()=> Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
  const escapeHTML = (s)=> (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  function toast(msg, type){
    const wrap = $("#toast") || (()=>{ const d=document.createElement("div"); d.id="toast"; document.body.appendChild(d); return d;})();
    const el = document.createElement("div");
    el.className = "toast "+(type||"");
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(()=>{ el.style.opacity="0"; el.style.transform="translateY(6px)"; el.style.transition="all .3s"; },2200);
    setTimeout(()=> el.remove(),2600);
  }

  function detectStreamType(url){
    const u = (url||"").toLowerCase().split("?")[0];
    if(u.endsWith(".m3u8")) return "hls";
    if(u.endsWith(".ts")) return "ts";
    if(u.endsWith(".mp4")) return "mp4";
    if(u.includes("/live/") && !u.endsWith(".m3u8")) return "ts";
    return "hls";
  }

  /* ---------- Export Tool ---------- */
  function exportToM3U(filterType) {
    if (!state.channels.length) {
      toast(t("noChannels"), "err");
      return;
    }
    let targetChannels = [];
    let fileName = "playlist_all.m3u";

    if (filterType === "all") {
      targetChannels = state.channels;
      fileName = "kikon_all_channels.m3u";
    } else if (filterType === "favorites") {
      targetChannels = state.channels.filter(c => c.fav);
      fileName = "kikon_favorites.m3u";
    } else if (filterType === "group") {
      if (state.activeGroup === "__all__") {
        targetChannels = state.channels;
        fileName = "kikon_all_channels.m3u";
      } else if (state.activeGroup === "__fav__") {
        targetChannels = state.channels.filter(c => c.fav);
        fileName = "kikon_favorites.m3u";
      } else {
        targetChannels = state.channels.filter(c => c.group === state.activeGroup);
        fileName = `kikon_group_${state.activeGroup.replace(/\s+/g, '_')}.m3u`;
      }
    }

    if (!targetChannels.length) {
      toast(t("noChannels"), "err");
      return;
    }

    let m3uContent = "#EXTM3U\n";
    targetChannels.forEach(c => {
      m3uContent += `#EXTINF:-1 tvg-logo="${c.logo || ''}" group-title="${c.group || 'Uncategorized'}",${c.name}\n${c.url}\n`;
    });

    const blob = new Blob([m3uContent], { type: "text/plain;charset=utf-8" });
    const downloadLink = document.createElement("a");
    downloadLink.href = URL.createObjectURL(blob);
    downloadLink.download = fileName;
    document.body.appendChild(downloadLink);
    downloadLink.click();
    document.body.removeChild(downloadLink);
    toast(t("ok"), "ok");
  }

  /* ---------- Parsers ---------- */
  function parseM3U(text){
    const lines = text.split(/\r?\n/);
    const out = [];
    let cur = null;
    for(let i=0;i<lines.length;i++){
      const line = lines[i].trim();
      if(!line) continue;
      if(line.startsWith("#EXTINF")){
        const nameMatch = line.match(/,(.*)$/);
        const attrs = {};
        line.replace(/([a-zA-Z0-9_-]+)="([^"]*)"/g, (_,k,v)=>{ attrs[k.toLowerCase()]=v; return ""; });
        cur = {
          name: (nameMatch && nameMatch[1] || "").trim() || "Unknown",
          logo: attrs["tvg-logo"] || "",
          group: attrs["group-title"] || "Uncategorized",
        };
      } else if(line.startsWith("#")){
        continue;
      } else if(cur){
        cur.url = line;
        cur.id = uid();
        cur.type = detectStreamType(line);
        cur.fav = false;
        out.push(cur);
        cur = null;
      } else {
        out.push({id:uid(), name:"Stream "+(out.length+1), url:line, logo:"", group:"Uncategorized", type:detectStreamType(line), fav:false});
      }
    }
    return out;
  }

  function parseTXTSmart(text){
    const res = {host:"", user:"", pass:""};
    const clean = text.replace(/[\u200e\u200f\u202a-\u202e]/g,"").trim();

    let m = clean.match(/https?:\/\/[^\s"'<>]+?[?&]username=([^&\s"'<>]+)[^\s"'<>]*[?&]password=([^&\s"'<>]+)/i);
    if(m){
      const urlObj = m[0];
      const uMatch = urlObj.match(/[?&]username=([^&\s"'<>]+)/i);
      const pMatch = urlObj.match(/[?&]password=([^&\s"'<>]+)/i);
      const hMatch = urlObj.match(/^(https?:\/\/[^\/?#\s]+)/i);
      if(uMatch) res.user = decodeURIComponent(uMatch[1]);
      if(pMatch) res.pass = decodeURIComponent(pMatch[1]);
      if(hMatch) res.host = hMatch[1];
    }

    if(!res.host){
      const urlMatch = clean.match(/https?:\/\/[^\s"'<>\/]+(?::\d+)?/i);
      if(urlMatch){ res.host = urlMatch[0].replace(/\/+$/,""); }
    }
    if(!res.host){
      const bare = clean.match(/(?:^|\s)([a-zA-Z0-9.\-]+\.[a-zA-Z]{2,}(?::\d{2,5})?)(?=\s|$|\/)/);
      if(bare){ res.host = "http://"+bare[1]; }
    }
    if(!res.host){
      const ip = clean.match(/(?:^|\s)((?:\d{1,3}\.){3}\d{1,3}(?::\d{2,5})?)(?=\s|$|\/)/);
      if(ip){ res.host = "http://"+ip[1]; }
    }

    const kv = (labels)=>{
      const rx = new RegExp("(?:"+labels+")\\s*(?:[:=]|-+>?|\\|)\\s*([^\\s,;\\|\\n\\r\"'<>]+)","i");
      const mm = clean.match(rx); return mm? mm[1] : "";
    };
    if(!res.user) res.user = kv("user(?:name)?|login|utilisateur|usuario|اسم\\s*المستخدم");
    if(!res.pass) res.pass = kv("pass(?:word)?|pwd|mot\\s*de\\s*passe|contraseña|كلمة\\s*(?:ال)?سر|كلمة\\s*(?:ال)?مرور");

    if(!res.user || !res.pass){
      const tokens = clean.replace(/https?:\/\/\S+/g," ").split(/[\s,;\|]+/).filter(Boolean);
      if(tokens.length >= 2){
        if(!res.user) res.user = tokens[tokens.length-2];
        if(!res.pass) res.pass = tokens[tokens.length-1];
      }
    }

    if(res.host){
      if(!/^https?:\/\//i.test(res.host)) res.host = "http://"+res.host;
      res.host = res.host.replace(/\/+$/,"");
    }
    return res;
  }

  async function fetchXtream(host, user, pass){
    host = host.replace(/\/+$/,"");
    if(!/^https?:\/\//i.test(host)) host = "http://"+host;
    const base = `${host}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
    const [cats, streams] = await Promise.all([
      fetch(base+"&action=get_live_categories").then(r=>r.json()).catch(()=>[]),
      fetch(base+"&action=get_live_streams").then(r=>r.json()).catch(()=>[])
    ]);
    const catMap = {}; (cats||[]).forEach(c=> catMap[c.category_id]=c.category_name);
    const out = [];
    (streams||[]).forEach(s=>{
      const url = `${host}/live/${encodeURIComponent(user)}/${encodeURIComponent(pass)}/${s.stream_id}.ts`;
      out.push({
        id: uid(),
        name: s.name || ("ch "+s.stream_id),
        logo: s.stream_icon || "",
        group: catMap[s.category_id] || "Uncategorized",
        url,
        type: "ts",
        fav: false,
      });
    });
    return out;
  }

  /* ---------- Dead-channel scanner ---------- */
  async function probeChannel(ch, timeoutMs){
    return new Promise((resolve)=>{
      const ctrl = new AbortController();
      const to = setTimeout(()=>{ ctrl.abort(); resolve(false); }, timeoutMs||4500);
      fetch(ch.url, {method:"GET", mode:"no-cors", signal:ctrl.signal})
        .then(()=>{ clearTimeout(to); resolve(true); })
        .catch(()=>{ clearTimeout(to); resolve(false); });
    });
  }
  async function scanChannels(onProgress){
    const total = state.channels.length;
    const dead = [];
    const CONCURRENCY = 8;
    let idx = 0, done = 0;
    async function worker(){
      while(idx < total){
        const i = idx++;
        const ch = state.channels[i];
        const alive = await probeChannel(ch, 4500);
        if(!alive) dead.push(ch.id);
        done++;
        if(onProgress) onProgress(done, total, dead.length);
      }
    }
    const workers = [];
    for(let i=0;i<CONCURRENCY;i++) workers.push(worker());
    await Promise.all(workers);
    return dead;
  }

  /* ---------- Player engine ---------- */
  const Player = {
    video:null, hls:null, mpegts:null, currentUrl:null, currentType:null,
    _watch:null, _lastTime:0, _stallSince:0, _restartAt:0,
    setVideo(v){ this.video = v; },
    stopWatchdog(){ if(this._watch){ clearInterval(this._watch); this._watch=null; } this._stallSince=0; this._lastTime=0; },
    startWatchdog(){
      this.stopWatchdog();
      this._lastTime = this.video ? this.video.currentTime : 0;
      this._stallSince = 0;
      this._watch = setInterval(()=> this._tick(), 1000);
    },
    _tick(){
      const v = this.video; if(!v || !this.currentUrl) return;
      if(v.paused && v.readyState>0) return;

      const now = Date.now();
      const cur = v.currentTime;
      const advancing = cur > this._lastTime + 0.05;
      if(advancing){
        this._lastTime = cur;
        this._stallSince = 0;
        return;
      }
      let hasHead = false;
      try{
        if(v.buffered && v.buffered.length){
          const end = v.buffered.end(v.buffered.length-1);
          hasHead = (end - cur) > 0.5;
        }
      }catch(e){}
      if(!hasHead){
        this._stallSince = 0;
        return;
      }

      if(!this._stallSince) this._stallSince = now;
      const stalledMs = now - this._stallSince;

      if(stalledMs > 6000 && stalledMs < 7000){
        try{ v.currentTime = cur + 0.3; }catch(e){}
      }
      if(stalledMs > 12000 && stalledMs < 13000){
        try{
          if(this.hls){ this.hls.stopLoad(); this.hls.startLoad(-1); }
          else if(this.mpegts){ this.mpegts.unload(); this.mpegts.load(); this.mpegts.play().catch(()=>{}); }
        }catch(e){}
      }
      if(stalledMs > 20000 && now - this._restartAt > 25000){
        this._restartAt = now;
        this.play(this.currentUrl, this.currentType);
      }
    },
    destroy(keepPoster){
      this.stopWatchdog();
      try{ if(this.hls){ this.hls.destroy(); this.hls=null; } }catch(e){}
      try{ if(this.mpegts){ this.mpegts.pause(); this.mpegts.unload(); this.mpegts.detachMediaElement(); this.mpegts.destroy(); this.mpegts=null; } }catch(e){}
      if(this.video && !keepPoster){
        try{ this.video.pause(); this.video.removeAttribute("src"); this.video.load(); }catch(e){}
      }
      this.currentUrl=null; this.currentType=null;
    },
    play(url, type){
      if(!this.video) return;
      this.destroy();
      this.currentUrl = url;
      this.currentType = type || detectStreamType(url);
      const v = this.video;
      v.muted = state.muted;
      v.volume = state.volume;

      showLoader(true);

      const self = this;
      if(this.currentType === "hls"){
        if(window.Hls && Hls.isSupported()){
          const hls = new Hls({
            lowLatencyMode:false,
            liveSyncDurationCount:6,
            liveMaxLatencyDurationCount:15,
            liveDurationInfinity:true,
            maxBufferLength:60,
            maxMaxBufferLength:120,
            maxBufferSize: 120 * 1000 * 1000,
            maxBufferHole:0.5,
            highBufferWatchdogPeriod:3,
            nudgeOffset:0.2,
            nudgeMaxRetry:5,
            enableWorker:true,
            backBufferLength:30,
            startFragPrefetch:true,
            testBandwidth:false,
            abrEwmaFastLive:5,
            abrEwmaSlowLive:9,
            manifestLoadingMaxRetry:8,
            levelLoadingMaxRetry:8,
            fragLoadingMaxRetry:8,
            manifestLoadingRetryDelay:1000,
            levelLoadingRetryDelay:1000,
            fragLoadingRetryDelay:1000,
            fragLoadingTimeOut:20000,
            manifestLoadingTimeOut:15000,
          });
          this.hls = hls;
          hls.loadSource(url);
          hls.attachMedia(v);
          hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ tryPlay(); });
          hls.on(Hls.Events.ERROR, (evt,data)=>{
            if(!data) return;
            if(data.fatal){
              switch(data.type){
                case Hls.ErrorTypes.NETWORK_ERROR:
                  try{ hls.startLoad(); }catch(e){ setTimeout(()=> self.play(url,type), 1500); }
                  break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                  try{ hls.recoverMediaError(); }catch(e){ setTimeout(()=> self.play(url,type), 1500); }
                  break;
                default:
                  setTimeout(()=> self.play(url,type), 1500);
              }
            }
          });
        } else if(v.canPlayType("application/vnd.apple.mpegurl")){
          v.src = url; tryPlay();
        } else {
          v.src = url; tryPlay();
        }
      } else if(this.currentType === "ts"){
        if(window.mpegts && mpegts.getFeatureList().mseLivePlayback){
          const p = mpegts.createPlayer({type:"mpegts", isLive:true, url:url},{
            enableWorker:true,
            enableStashBuffer:true,
            stashInitialSize:1024,
            isLive:true,
            liveBufferLatencyChasing:false,
            liveBufferLatencyMaxLatency:15.0,
            liveBufferLatencyMinRemain:3.0,
            lazyLoad:true,
            lazyLoadMaxDuration:30,
            lazyLoadRecoverDuration:10,
            deferLoadAfterSourceOpen:false,
            autoCleanupSourceBuffer:true,
            autoCleanupMaxBackwardDuration:60,
            autoCleanupMinBackwardDuration:30,
            reuseRedirectedURL:true,
            fixAudioTimestampGap:true,
          });
          this.mpegts = p;
          p.attachMediaElement(v);
          p.load();
          p.play().catch(()=>{});
          p.on(mpegts.Events.ERROR, ()=>{ setTimeout(()=> self.play(url,type), 1500); });
        } else {
          v.src = url; tryPlay();
        }
      } else {
        v.src = url; tryPlay();
      }

      function tryPlay(){
        const pr = v.play();
        if(pr && pr.catch) pr.catch(()=>{});
      }

      setTimeout(()=> self.startWatchdog(), 3000);
    },
    liveEdge(force){
      const v = this.video; if(!v) return;
      try{
        if(v.buffered && v.buffered.length){
          const end = v.buffered.end(v.buffered.length-1);
          const gap = end - v.currentTime;
          if(force || gap > 8){ v.currentTime = Math.max(0, end - 2); }
        }
      }catch(e){}
    }
  };

  function renderGroups(){

    state.channels.forEach(c=>{ counts[c.group]=(counts[c.group]||0)+1; });
    const groups = Array.from(new Set([...state.groupOrder, ...Object.keys(counts)])).filter(g=>counts[g]);
    state.groupOrder = groups.slice();
    const favCount = state.channels.filter(c=>c.fav).length;
    const q = ($("#groupSearch")?.value || "").toLowerCase();
    const items = [
      {key:"__all__", name:t("all"), icon:"fa-globe", count: state.channels.length},
      {key:"__fav__", name:t("favorites"), icon:"fa-star", count: favCount},
      ...groups.filter(g=>!q||g.toLowerCase().includes(q)).map(g=>({key:g, name:g, icon:"fa-folder", count:counts[g]}))
    ];
    list.innerHTML = items.map(it=>`
      <div class="group-tile ${state.activeGroup===it.key?'active':''}" data-group="${escapeHTML(it.key)}">

          <div class="text-[10px] text-[var(--text-3)]">${it.count} ${escapeHTML(t("chanCount"))}</div>

    `).join("");

      el.addEventListener("click", ()=>{

  function attachVideoEvents(v){
    if(!v) return;
    v.addEventListener("waiting", ()=> showLoader(true));
    v.addEventListener("stalled", ()=> showLoader(true));
    v.addEventListener("playing", ()=>{ showLoader(false); });
    v.addEventListener("canplay", ()=>{ showLoader(false); });
    v.addEventListener("play", ()=>{ const b=$("#btnPlay"); if(b) b.innerHTML='<i class="fa-solid fa-pause"></i>'; });
    v.addEventListener("pause", ()=>{ const b=$("#btnPlay"); if(b) b.innerHTML='<i class="fa-solid fa-play"></i>'; });
    v.addEventListener("volumechange",()=>{
      state.volume = v.volume; state.muted = v.muted; save();
      const m = $("#btnMute"); if(m) m.innerHTML = v.muted||v.volume===0?'<i class="fa-solid fa-volume-xmark"></i>':'<i class="fa-solid fa-volume-high"></i>';

    menu.id = "chMenu";
    menu.className = "card fade-in";
    menu.style.cssText = "position:absolute;z-index:50;min-width:200px;padding:.35rem;box-shadow:0 12px 30px rgba(0,0,0,.6);";
    menu.innerHTML = `
      <button class="ch-menu-item" data-a="fav"><i class="fa-${ch.fav?'solid text-yellow-400':'regular'} fa-star w-4"></i>${escapeHTML(t(ch.fav?'removeFav':'addFav'))}</button>
      <button class="ch-menu-item" data-a="up"><i class="fa-solid fa-arrow-up w-4"></i>${escapeHTML(t("moveUp"))}</button>
      <button class="ch-menu-item" data-a="down"><i class="fa-solid fa-arrow-down w-4"></i>${escapeHTML(t("moveDown"))}</button>
      <button class="ch-menu-item" data-a="move"><i class="fa-solid fa-folder-open w-4"></i>${escapeHTML(t("moveTo"))}</button>
      <button class="ch-menu-item" data-a="rename"><i class="fa-solid fa-pen w-4"></i>${escapeHTML(t("rename"))}</button>
      <div class="divider my-1"></div>
      <button class="ch-menu-item text-[var(--danger)]" data-a="del"><i class="fa-solid fa-trash w-4"></i>${escapeHTML(t("del"))}</button>
    `;
    document.body.appendChild(menu);
    $$(".ch-menu-item", menu).forEach(el=>{
      el.style.cssText = "display:flex;align-items:center;gap:.55rem;width:100%;padding:.55rem .7rem;border-radius:8px;font-size:.82rem;background:transparent;color:var(--text);cursor:pointer;text-align:"+(state.lang==='ar'?'right':'left')+";";
      el.addEventListener("mouseenter", ()=> el.style.background="var(--bg-3)");
      el.addEventListener("mouseleave", ()=> el.style.background="transparent");
    });
    const r = anchor.getBoundingClientRect();
    menu.style.top = (r.bottom+6)+"px";
    const w = 220;
    let left = r.right - w; if(left<8) left=8;
    menu.style.left = left+"px";
    const close = ()=>{ menu.remove(); document.removeEventListener("click", onDoc); };
    const onDoc = (e)=>{ if(!menu.contains(e.target)) close(); };
    setTimeout(()=> document.addEventListener("click", onDoc), 0);

    menu.querySelectorAll("[data-a]").forEach(b=>{
      b.addEventListener("click", ()=>{
        const a = b.dataset.a;
        if(a==="fav"){ toggleFav(id); }
        else if(a==="up"||a==="down"){ moveChannel(id, a==="up"?-1:1); }
        else if(a==="move"){ openMoveDialog(id); }
        else if(a==="rename"){ renameChannel(id); }
        else if(a==="del"){ deleteChannel(id); }
        close();
      });
    });
  }

  function moveChannel(id, dir){
    const list = state.channels;
    const i = list.findIndex(c=>c.id===id); if(i<0) return;
    const groupIdx = [];
    list.forEach((c,idx)=>{ if(c.group === list[i].group) groupIdx.push(idx); });
    const posInGroup = groupIdx.indexOf(i);
    const swapPos = posInGroup + dir;
    if(swapPos<0 || swapPos>=groupIdx.length) return;
    const j = groupIdx[swapPos];
    [list[i], list[j]] = [list[j], list[i]];
    save(); renderChannels();
  }

  function renameChannel(id){
    const ch = state.channels.find(c=>c.id===id); if(!ch) return;
    const name = prompt(t("rename"), ch.name);
    if(name && name.trim()){ ch.name = name.trim(); save(); renderChannels(); updateNowPlaying(); }
  }

  function deleteChannel(id){
    if(!confirm(t("del")+"?")) return;
    state.channels = state.channels.filter(c=>c.id!==id);
    if(state.activeChannelId===id){ state.activeChannelId=null; Player.destroy(); }
    save(); renderChannels(); renderGroups(); updateNowPlaying();
  }

  function openMoveDialog(id){
    const ch = state.channels.find(c=>c.id===id); if(!ch) return;
    const groups = Array.from(new Set(state.channels.map(c=>c.group)));
    const opts = groups.map(g=>`<option value="${escapeHTML(g)}" ${g===ch.group?"selected":""}>${escapeHTML(g)}</option>`).join("");
    openModalCustom(t("moveTo"), `
      <div class="space-y-3">
        <div>
          <label class="text-xs text-[var(--text-2)] mb-1 block">${escapeHTML(t("selectDest"))}</label>
          <select class="input" id="mvSel">${opts}</select>
        </div>
        <div class="text-center text-xs text-[var(--text-3)]">— أو —</div>
        <div>
          <label class="text-xs text-[var(--text-2)] mb-1 block">${escapeHTML(t("newGroup"))}</label>
          <input class="input" id="mvNew" placeholder="${escapeHTML(t("newGroup"))}"/>
        </div>
      </div>
    `, [
      {label:t("cancel"), onClick:closeModal},
      {label:t("save"), primary:true, onClick:()=>{
        const sel = $("#mvSel").value; const nw = $("#mvNew").value.trim();
        ch.group = nw || sel; save(); renderChannels(); renderGroups(); closeModal();
      }}
    ]);
  }

  /* ---------- Modals ---------- */
  function closeModal(){ $("#modalRoot")?.remove(); }
  function openModalCustom(title, bodyHtml, buttons){
    closeModal();
    const root = document.createElement("div");
    root.id = "modalRoot"; root.className="modal-back";
    root.innerHTML = `
      <div class="modal fade-in">
        <div class="modal-head">
          <div class="font-bold">${escapeHTML(title)}</div>
          <button class="pc-btn" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
        <div class="p-3 border-t border-[var(--line)] flex gap-2 justify-end" id="modalBtns"></div>
      </div>`;
    document.body.appendChild(root);
    $("#modalClose").onclick = closeModal;
    root.addEventListener("click",(e)=>{ if(e.target===root) closeModal(); });
    (buttons||[]).forEach(b=>{
      const el = document.createElement("button");
      el.className = "btn "+(b.primary?"btn-primary":"");
      el.textContent = b.label;
      el.onclick = b.onClick;
      $("#modalBtns").appendChild(el);
    });
  }

  function openModal(kind){
    if(kind==="import") openImportModal();
    else if(kind==="settings") openSettingsModal();
    else if(kind==="quick") openQuickModal();
    else if(kind==="scan") openScanModal();
  }

  function openQuickModal(){
    openModalCustom(t("quickUrl"), `
      <div class="space-y-3">
        <div class="text-xs text-[var(--text-3)]">${escapeHTML(t("pasteUrl"))}</div>
        <input class="input" id="qUrl" placeholder="https://example.com/stream.m3u8"/>
        <input type="file" id="qFile" accept="video/*,.m3u8,.ts,.mp4,.mkv,.webm" class="hidden"/>
        <button class="btn w-full" onclick="document.getElementById('qFile').click()"><i class="fa-solid fa-folder-open"></i>${escapeHTML(t("openFile"))}</button>
      </div>
    `, [
      {label:t("cancel"), onClick:closeModal},
      {label:t("play"), primary:true, onClick:()=>{
        const url = $("#qUrl").value.trim();
        const f = $("#qFile").files[0];
        if(f){
          const obj = URL.createObjectURL(f);
          const ch = {id:uid(), name:f.name, url:obj, group:"Local", type:"mp4", fav:false, logo:""};
          state.channels.unshift(ch); save(); renderChannels(); renderGroups();
          selectChannel(ch.id); closeModal(); return;
        }
        if(url){
          const ch = {id:uid(), name:url.split("/").pop().split("?")[0]||"Stream", url, group:"Quick", type:detectStreamType(url), fav:false, logo:""};
          state.channels.unshift(ch); save(); renderChannels(); renderGroups();
          selectChannel(ch.id); closeModal();
        }
      }}
    ]);
    $("#qFile").addEventListener("change",(e)=>{
      const f = e.target.files[0]; if(!f) return;
      $("#qUrl").value = f.name+" (local)";
    });
  }

  function openScanModal(){
    if(!state.channels.length){ toast(t("noChannels"),"err"); return; }
    openModalCustom(t("scan"), `
      <div class="space-y-3">
        <div class="text-xs text-[var(--text-3)]">${escapeHTML(t("scanning"))} — ${state.channels.length} ${escapeHTML(t("totalChannels"))}</div>
        <div class="w-full bg-[var(--bg-3)] rounded-full h-2 overflow-hidden">
          <div id="scanBar" class="bg-[var(--accent)] h-2 transition-all" style="width:0%"></div>
        </div>
        <div class="flex items-center justify-between text-xs">
          <span id="scanTxt">0 / ${state.channels.length}</span>
          <span id="scanDead" class="text-[var(--danger)]">0 ${escapeHTML(t("dead"))}</span>
        </div>
        <div class="text-xs text-[var(--text-3)]">ملاحظة: بعض الخوادم تحجب فحص المتصفح ما قد يعطي نتائج تقريبية.</div>
      </div>
    `, [
      {label:t("cancel"), onClick:()=>{ window._cancelScan=true; closeModal(); }},
    ]);
    window._cancelScan = false;
    let deadIds = [];
    scanChannels((done,total,dc)=>{
      if(window._cancelScan) return;
      const pct = Math.round(done*100/total);
      const bar = $("#scanBar"); const tx = $("#scanTxt"); const dd=$("#scanDead");
      if(bar) bar.style.width = pct+"%";
      if(tx) tx.textContent = `${done} / ${total}`;
      if(dd) dd.textContent = `${dc} ${t("dead")}`;
    }).then(dead=>{
      if(window._cancelScan) return;
      deadIds = dead;
      openModalCustom(t("scanDone"), `
        <div class="space-y-3">
          <div class="text-sm">${dead.length} ${escapeHTML(t("dead"))} / ${state.channels.length} ${escapeHTML(t("totalChannels"))}</div>
        </div>
      `, [
        {label:t("cancel"), onClick:closeModal},
        {label:t("removeDead")+` (${dead.length})`, primary:true, onClick:()=>{
          const setD = new Set(dead);
          state.channels = state.channels.filter(c=>!setD.has(c.id));
          if(setD.has(state.activeChannelId)){ state.activeChannelId=null; Player.destroy(); }
          save(); renderChannels(); renderGroups(); updateNowPlaying(); closeModal();
          toast(t("scanDone"),"ok");
        }}
      ]);
    });
  }

  function openImportModal(){
    closeModal();
    const root = document.createElement("div");
    root.id="modalRoot"; root.className="modal-back";
    root.innerHTML = `
      <div class="modal fade-in">
        <div class="modal-head">
          <div class="flex items-center gap-2 font-bold"><i class="fa-solid fa-cloud-arrow-down"></i>${escapeHTML(t("importList"))}</div>
          <button class="pc-btn" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="tabs" id="tabs">
          <div class="tab active" data-tab="m3u"><i class="fa-solid fa-list-ul mr-1"></i>${escapeHTML(t("addM3U"))}</div>
          <div class="tab" data-tab="xt"><i class="fa-solid fa-key mr-1"></i>${escapeHTML(t("xtream"))}</div>
          <div class="tab" data-tab="txt"><i class="fa-solid fa-file-lines mr-1"></i>${escapeHTML(t("txt"))}</div>
        </div>
        <div class="modal-body" id="tabBody"></div>
      </div>`;
    document.body.appendChild(root);
    $("#modalClose").onclick = closeModal;
    root.addEventListener("click",(e)=>{ if(e.target===root) closeModal(); });
    const tabs = { m3u:tabM3U, xt:tabXtream, txt:tabTXT };
    $$("#tabs .tab").forEach(tb=>{
      tb.addEventListener("click",()=>{
        $$("#tabs .tab").forEach(x=>x.classList.remove("active"));
        tb.classList.add("active");
        tabs[tb.dataset.tab]();
      });
    });
    tabs.m3u();
  }

  function tabM3U(){
    $("#tabBody").innerHTML = `
      <div class="space-y-3">
        <div class="text-xs text-[var(--text-3)]">${escapeHTML(t("m3uHint"))}</div>
        <input class="input" id="m3uUrl" placeholder="${escapeHTML(t("m3uUrl"))} https://…"/>
        <div class="flex gap-2">
          <input type="file" id="m3uFile" accept=".m3u,.m3u8,text/plain" class="hidden"/>
          <button class="btn" onclick="document.getElementById('m3uFile').click()"><i class="fa-solid fa-file-arrow-up"></i>${escapeHTML(t("loadFile"))}</button>
          <button class="btn btn-primary flex-1" id="m3uGo"><i class="fa-solid fa-download"></i>${escapeHTML(t("importBtn"))}</button>
        </div>
        <textarea class="input" id="m3uText" rows="6" placeholder="${escapeHTML(t("pasteM3U"))}"></textarea>
      </div>
    `;
    $("#m3uFile").addEventListener("change",(e)=>{
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ()=>{ $("#m3uText").value = r.result; };
      r.readAsText(f);
    });
    $("#m3uGo").onclick = async ()=>{
      const url = $("#m3uUrl").value.trim();
      const txt = $("#m3uText").value.trim();
      try{
        let content = txt;
        if(!content && url){
          const r = await fetch(url); if(!r.ok) throw new Error("fetch");
          content = await r.text();
        }
        if(!content){ toast(t("addedFail"),"err"); return; }
        const list = parseM3U(content);
        if(!list.length){ toast(t("addedFail"),"err"); return; }
        appendChannels(list);
        toast(`${t("addedOk")} — ${list.length} ${t("chanCount")}`,"ok");
        closeModal();
      }catch(e){ toast(t("addedFail"),"err"); }
    };
  }

  function tabXtream(){
    $("#tabBody").innerHTML = `
      <div class="space-y-3">
        <div class="text-xs text-[var(--text-3)]">${escapeHTML(t("xtreamHint"))}</div>
        <input class="input" id="xtHost" placeholder="${escapeHTML(t("host"))}"/>
        <div class="grid grid-cols-2 gap-2">
          <input class="input" id="xtUser" placeholder="${escapeHTML(t("user"))}"/>
          <input class="input" id="xtPass" placeholder="${escapeHTML(t("pass"))}" type="password"/>
        </div>
        <button class="btn btn-primary w-full" id="xtGo"><i class="fa-solid fa-plug"></i>${escapeHTML(t("importBtn"))}</button>
      </div>
    `;
    $("#xtGo").onclick = async ()=>{
      const host = $("#xtHost").value.trim();
      const user = $("#xtUser").value.trim();
      const pass = $("#xtPass").value.trim();
      if(!host||!user||!pass){ toast(t("addedFail"),"err"); return; }
      try{
        const btn = $("#xtGo"); btn.disabled=true; btn.innerHTML='<div class="loader" style="width:18px;height:18px;border-width:2px"></div>';
        const list = await fetchXtream(host,user,pass);
        if(!list.length){ toast(t("addedFail"),"err"); btn.disabled=false; btn.innerHTML=`<i class="fa-solid fa-plug"></i>${escapeHTML(t("importBtn"))}`; return; }
        appendChannels(list);
        toast(`${t("addedOk")} — ${list.length} ${t("chanCount")}`,"ok");
        closeModal();
      }catch(e){ toast(t("addedFail"),"err"); }
    };
  }

  function tabTXT(){
    $("#tabBody").innerHTML = `
      <div class="space-y-3">
        <div class="text-xs text-[var(--text-3)]">${escapeHTML(t("txtHint"))}</div>
        <input type="file" id="txtFile" accept=".txt,text/plain" class="hidden"/>
        <button class="btn w-full" onclick="document.getElementById('txtFile').click()"><i class="fa-solid fa-file-arrow-up"></i>${escapeHTML(t("loadFile"))}</button>
        <textarea class="input" id="txtBody" rows="7" placeholder="host: http://…\nuser: xxxx\npass: yyyy"></textarea>
        <button class="btn btn-primary w-full" id="txtParse"><i class="fa-solid fa-wand-magic-sparkles"></i>${escapeHTML(t("parseFile"))}</button>
        <div class="grid grid-cols-1 gap-2" id="txtFields" style="display:none">
          <input class="input" id="txHost" placeholder="${escapeHTML(t("host"))}"/>
          <div class="grid grid-cols-2 gap-2">
            <input class="input" id="txUser" placeholder="${escapeHTML(t("user"))}"/>
            <input class="input" id="txPass" placeholder="${escapeHTML(t("pass"))}"/>
          </div>
          <button class="btn btn-primary" id="txGo"><i class="fa-solid fa-plug"></i>${escapeHTML(t("importBtn"))}</button>
        </div>
      </div>
    `;
    $("#txtFile").addEventListener("change",(e)=>{
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader(); r.onload=()=>{ $("#txtBody").value = r.result; }; r.readAsText(f);
    });
    $("#txtParse").onclick = ()=>{
      const parsed = parseTXTSmart($("#txtBody").value);
      $("#txtFields").style.display="grid";
      $("#txHost").value = parsed.host;
      $("#txUser").value = parsed.user;
      $("#txPass").value = parsed.pass;
    };
    $("#tabBody").addEventListener("click", async (e)=>{
      if(e.target.closest("#txGo")){
        const host = $("#txHost").value.trim(), user=$("#txUser").value.trim(), pass=$("#txPass").value.trim();
        if(!host||!user||!pass){ toast(t("addedFail"),"err"); return; }
        try{
          const list = await fetchXtream(host,user,pass);
          if(!list.length){ toast(t("addedFail"),"err"); return; }
          appendChannels(list);
          toast(`${t("addedOk")} — ${list.length} ${t("chanCount")}`,"ok");
          closeModal();
        }catch(err){ toast(t("addedFail"),"err"); }
      }
    });
  }

  function appendChannels(list){
    const known = new Set(state.channels.map(c=>c.url));
    list.forEach(c=>{ if(!known.has(c.url)) state.channels.push(c); });
    const groups = Array.from(new Set(state.channels.map(c=>c.group)));
    groups.forEach(g=>{ if(!state.groupOrder.includes(g)) state.groupOrder.push(g); });
    save(); renderGroups(); renderChannels();
  }

  function openSettingsModal(){
    openModalCustom(t("settings"), `
      <div class="space-y-4">
        <div>
          <label class="text-xs text-[var(--text-2)] mb-1 block">${escapeHTML(t("lang"))}</label>
          <select class="input" id="stLang">
            <option value="ar" ${state.lang==='ar'?'selected':''}>العربية</option>
            <option value="en" ${state.lang==='en'?'selected':''}>English</option>
          </select>
        </div>
        <div class="chip"><i class="fa-solid fa-database"></i>${state.channels.length} ${escapeHTML(t("totalChannels"))} • ${(new Set(state.channels.map(c=>c.group))).size} ${escapeHTML(t("totalGroups"))}</div>
        
        <div class="divider"></div>
        
        <div class="space-y-2">
          <label class="text-xs font-bold text-[var(--text-2)] block">${escapeHTML(t("exportSettings"))}</label>
          <div class="grid grid-cols-1 gap-2">
            <button class="btn btn-ghost !justify-start w-full text-xs" id="btnExportAll">
              <i class="fa-solid fa-file-export text-[var(--accent)]"></i> ${escapeHTML(t("exportAll"))}
            </button>
            <button class="btn btn-ghost !justify-start w-full text-xs" id="btnExportFav">
              <i class="fa-solid fa-star text-yellow-400"></i> ${escapeHTML(t("exportFav"))}
            </button>
            <button class="btn btn-ghost !justify-start w-full text-xs" id="btnExportGroup">
              <i class="fa-solid fa-folder text-[var(--accent-2)]"></i> ${escapeHTML(t("exportGroup"))}
            </button>
          </div>
        </div>
      </div>
    `,[
      {label:t("cancel"), onClick:closeModal},
      {label:t("save"), primary:true, onClick:()=>{
        state.lang = $("#stLang").value; save(); closeModal(); render();
      }}
    ]);

    // Bind export actions inside settings view
    $("#btnExportAll").onclick = () => { exportToM3U("all"); closeModal(); };
    $("#btnExportFav").onclick = () => { exportToM3U("favorites"); closeModal(); };
    $("#btnExportGroup").onclick = () => { exportToM3U("group"); closeModal(); };
  }

  /* ---------- Bindings ---------- */
  function bind(){
    $$("[data-open]").forEach(b=> b.addEventListener("click",()=> openModal(b.dataset.open)));
    $("[data-action='clear']")?.addEventListener("click",()=>{
      if(!confirm(t("confirmClear"))) return;
      localStorage.removeItem(LS_KEY);
      state.channels=[]; state.groupOrder=[]; state.activeChannelId=null; state.activeGroup="__all__";
      Player.destroy(); toast(t("cleared"),"ok"); render();
    });

    $$("[data-toggle]").forEach(b=>{
      b.addEventListener("click",()=>{
        const which = b.dataset.toggle;
        const side = which==="left" ? $("#sideLeft") : $("#sideRight");
        const other = which==="left" ? $("#sideRight") : $("#sideLeft");
        other.classList.remove("open");
        side.classList.toggle("open");
        $("#backdrop").classList.toggle("on", side.classList.contains("open"));
      });
    });
    $("#backdrop")?.addEventListener("click", closeMobile);

    $("#chSearch")?.addEventListener("input",(e)=>{ state.search = e.target.value; renderChannels(); });
    $("#groupSearch")?.addEventListener("input", renderGroups);

    $("#btnPlay")?.addEventListener("click",()=>{
      const v = $("#video"); if(!v) return;
      if(v.paused){ Player.liveEdge(); v.play().catch(()=>{}); } else v.pause();
    });
    $("#btnMute")?.addEventListener("click",()=>{
      const v = $("#video"); if(!v) return; v.muted = !v.muted;
    });
    $("#vol")?.addEventListener("input",(e)=>{
      const v = $("#video"); if(!v) return; v.volume = parseFloat(e.target.value); v.muted=false;
    });
    $$("[data-fit]").forEach(b=>{
      b.addEventListener("click",()=>{ state.fit = b.dataset.fit; save(); applyFit(); });
    });
    $("#btnPip")?.addEventListener("click", async ()=>{
      const v=$("#video"); if(!v) return;
      try{ if(document.pictureInPictureElement) await document.exitPictureInPicture(); else await v.requestPictureInPicture(); }catch(e){}
    });
    $("#btnFs")?.addEventListener("click",()=>{
      const el = $("#playerWrap"); if(!el) return;
      if(!document.fullscreenElement) el.requestFullscreen?.().catch(()=>{}); else document.exitFullscreen?.();
    });

    document.onkeydown = (e)=>{
      if(["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName)) return;
      const v = $("#video");
      if(e.key===" "){ e.preventDefault(); if(v){ v.paused? (Player.liveEdge(), v.play()) : v.pause(); } }
      else if(e.key.toLowerCase()==="m"){ if(v) v.muted=!v.muted; }
      else if(e.key.toLowerCase()==="f"){ $("#btnFs")?.click(); }
    };
  }

  render();

  const v = $("#video");
  if(v){ v.muted = state.muted; v.volume = state.volume; }

})();
</script>
